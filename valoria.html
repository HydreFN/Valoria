<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VALORIA — Royaume &amp; Défense</title>
<style>
@font-face{font-family:'sys';src:local('Arial Rounded MT Bold'),local('Helvetica');}
:root{
  --gold:#ffce3a;--gold2:#f0a500;--gold-d:#a06800;
  --wood:#caa472;--wood2:#a87f4a;--wood-d:#5e4422;
  --parch:#f5e6c8;--parch2:#e8d4a8;
  --green:#7cc442;--green2:#5ba428;
  --red:#ff5252;--red2:#d32f2f;
  --blue:#42a5f5;--blue2:#1976d2;
  --purple:#ab47bc;--purple2:#7b1fa2;
  --ink:#2a1a0a;--ink2:#3d2a14;
  --panel:#3a2818;--panel2:#4d3622;
  --shadow:rgba(20,10,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a2a3a;font-family:'sys','Trebuchet MS',sans-serif;touch-action:none;}
canvas{display:block;position:absolute;inset:0;}
#fx{pointer-events:none;}
#game{position:fixed;inset:0;}

/* ===== HUD TOP ===== */
#hud-top{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;padding:6px 8px;
  pointer-events:none;
}
.res-pod{
  display:flex;align-items:center;gap:4px;
  background:linear-gradient(180deg,#4d3622,#3a2818);
  border:2.5px solid var(--ink);border-radius:18px;
  padding:3px 9px 3px 5px;
  box-shadow:0 3px 0 var(--ink),0 4px 8px var(--shadow);
  pointer-events:auto;
}
.res-ico{font-size:1.05rem;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));}
.res-val{font-weight:800;color:#fff;font-size:.82rem;text-shadow:1px 1px 0 rgba(0,0,0,.5);min-width:18px;}
.res-cap{font-size:.55rem;color:rgba(255,255,255,.45);font-weight:700;}
.res-pod.full .res-val{color:#ff8a65;}
.spacer{flex:1;}
#hud-sub{position:fixed;top:42px;left:0;right:0;z-index:49;display:flex;justify-content:center;gap:6px;padding:0 8px;pointer-events:none;}
.sub-pod{display:flex;align-items:center;gap:4px;background:linear-gradient(180deg,rgba(60,42,24,.92),rgba(42,28,16,.92));border:2px solid var(--ink);border-radius:13px;padding:2px 9px;box-shadow:0 2px 0 var(--ink),0 3px 6px rgba(0,0,0,.3);pointer-events:auto;}
.sub-ico{font-size:.82rem;}
.sub-val{font-size:.64rem;font-weight:800;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.sub-pod.lvl{flex-direction:column;gap:1px;align-items:stretch;padding:2px 10px;}
.sub-pod.lvl .sub-val{display:flex;align-items:center;gap:3px;}
.lvl-bar{height:3px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;margin-top:1px;}
.lvl-fill{height:100%;width:30%;background:linear-gradient(90deg,#ffce3a,#ff9a3c);transition:width .4s;}
.day-pod{
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,#4d3622,#3a2818);
  border:2.5px solid var(--ink);border-radius:14px;
  padding:3px 11px;pointer-events:auto;
  box-shadow:0 3px 0 var(--ink),0 4px 8px var(--shadow);
}
.day-lbl{font-size:.5rem;color:var(--gold);font-weight:800;letter-spacing:1px;}
.day-num{font-size:.95rem;color:#fff;font-weight:800;line-height:1;text-shadow:1px 1px 0 rgba(0,0,0,.5);}

/* phase banner */
#phase-tag{
  position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:48;
  padding:4px 16px;border-radius:14px;font-weight:800;font-size:.72rem;
  letter-spacing:1px;color:#fff;pointer-events:none;
  border:2.5px solid var(--ink);box-shadow:0 3px 0 var(--ink);
  transition:background .5s,opacity .3s;display:flex;align-items:center;gap:6px;
}
#phase-tag.day{background:linear-gradient(180deg,#5cb3f0,#3a8fd0);}
#phase-tag.night{background:linear-gradient(180deg,#5e4a9e,#3d2d7e);}

/* ===== WAVE BAR (night) ===== */
#wave-bar{
  position:fixed;top:78px;left:50%;transform:translateX(-50%);z-index:48;
  width:min(280px,72vw);pointer-events:none;opacity:0;transition:opacity .3s;
}
#wave-bar.on{opacity:1;}
.wave-track{height:9px;background:rgba(0,0,0,.5);border:2px solid var(--ink);border-radius:8px;overflow:hidden;box-shadow:0 2px 0 var(--ink);}
.wave-fill{height:100%;width:100%;background:linear-gradient(90deg,#ff5252,#ff8a65);transition:width .3s;}
.wave-txt{text-align:center;font-size:.58rem;color:#fff;font-weight:800;margin-top:2px;text-shadow:1px 1px 2px #000;}

/* ===== BOTTOM TOOLBAR ===== */
#toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;align-items:flex-end;justify-content:center;gap:6px;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  pointer-events:none;
}
.tool-btn{
  pointer-events:auto;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  width:60px;padding:7px 4px 5px;border-radius:14px;
  background:linear-gradient(180deg,#5a4028,#3e2c18);
  border:2.5px solid var(--ink);
  box-shadow:0 4px 0 var(--ink),0 5px 10px var(--shadow);
  cursor:pointer;transition:transform .08s;position:relative;
}
.tool-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink);}
.tool-ico{font-size:1.35rem;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));}
.tool-lbl{font-size:.5rem;color:var(--gold);font-weight:800;letter-spacing:.3px;}
.tool-btn.primary{background:linear-gradient(180deg,#ffce3a,#f0a500);border-color:var(--gold-d);box-shadow:0 4px 0 var(--gold-d),0 5px 10px var(--shadow);}
.tool-btn.primary:active{box-shadow:0 2px 0 var(--gold-d);}
.tool-btn.primary .tool-lbl{color:var(--ink);}
.tool-btn.danger{background:linear-gradient(180deg,#ff6b6b,#d32f2f);border-color:#7a1515;box-shadow:0 4px 0 #7a1515,0 5px 10px var(--shadow);}
.tool-btn.danger .tool-lbl{color:#fff;}
.tool-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 3px;background:var(--red);border:2px solid var(--ink);border-radius:9px;font-size:.55rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;}

/* spell buttons row */
#spells{
  position:fixed;right:8px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:50;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.spell-btn{
  pointer-events:auto;width:52px;height:52px;border-radius:14px;
  background:linear-gradient(180deg,#5e4a9e,#3d2d7e);
  border:2.5px solid var(--ink);position:relative;cursor:pointer;
  box-shadow:0 4px 0 var(--ink),0 5px 10px var(--shadow);
  display:flex;align-items:center;justify-content:center;
  transition:transform .08s;overflow:hidden;
}
.spell-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink);}
.spell-ico{font-size:1.5rem;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));z-index:2;}
.spell-cd{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:3;transition:height .1s;}
.spell-cost{position:absolute;bottom:1px;right:3px;font-size:.5rem;font-weight:800;color:var(--gold);z-index:4;text-shadow:1px 1px 1px #000;}
.spell-btn.disabled{filter:grayscale(.6) brightness(.7);}

/* ===== BUILD PANEL (drawer) ===== */
#scrim{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);display:none;}
#scrim.on{display:block;}
#build-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  background:linear-gradient(180deg,#4a3420,#3a2818);
  border-top:3px solid var(--ink);border-radius:20px 20px 0 0;
  transform:translateY(110%);transition:transform .32s cubic-bezier(.2,.7,.2,1.1);
  max-height:76vh;display:flex;flex-direction:column;
  box-shadow:0 -6px 0 var(--ink),0 -10px 30px rgba(0,0,0,.6);
  padding-bottom:env(safe-area-inset-bottom);
}
#build-panel.on{transform:translateY(0);}
.bp-grip{width:44px;height:5px;background:rgba(255,255,255,.25);border-radius:3px;margin:9px auto 4px;}
.bp-head{display:flex;align-items:center;gap:8px;padding:4px 14px 8px;}
.bp-title{font-size:1rem;font-weight:800;color:var(--gold);text-shadow:1px 1px 0 rgba(0,0,0,.4);flex:1;}
.bp-x{width:30px;height:30px;border-radius:9px;background:rgba(0,0,0,.3);border:2px solid var(--ink);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bp-tabs{display:flex;gap:5px;padding:0 14px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.bp-tabs::-webkit-scrollbar{display:none;}
.bp-tab{flex-shrink:0;padding:5px 13px;border-radius:13px;font-size:.62rem;font-weight:800;color:rgba(255,255,255,.55);background:rgba(0,0,0,.25);border:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.3px;}
.bp-tab.on{color:var(--ink);background:linear-gradient(180deg,#ffce3a,#f0a500);border-color:var(--gold-d);box-shadow:0 2px 0 var(--gold-d);}
.bp-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;align-content:start;}
.bp-grid::-webkit-scrollbar{width:0;}
.bcard{
  background:linear-gradient(170deg,#5e4429,#3e2c1a);
  border:2.5px solid var(--ink);border-radius:14px;
  padding:0;cursor:pointer;position:relative;
  box-shadow:0 3px 0 var(--ink),inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .08s;
  display:flex;flex-direction:column;align-items:stretch;
  height:184px;overflow:hidden;
}
.bcard:active{transform:translateY(2px) scale(.98);box-shadow:0 1px 0 var(--ink);}
.bcard.locked{opacity:.5;}
.bcard.cant{opacity:.62;}
/* Titre EN HAUT, bandeau sombre, toujours lisible */
.bcard-nm{font-size:.6rem;font-weight:800;color:#ffe8b8;text-align:center;line-height:1.12;
  padding:4px 3px;
  background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,0));
  text-shadow:0 1px 2px rgba(0,0,0,.9);
  height:30px;flex-shrink:0;box-sizing:border-box;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  border-bottom:1px solid rgba(255,255,255,.06);
  -webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;}
/* Coût + temps */
.bcard-meta{display:flex;flex-direction:column;align-items:center;gap:1px;width:100%;padding:3px 2px 1px;flex-shrink:0;}
.bcard-cost{display:flex;flex-wrap:wrap;gap:1px 5px;justify-content:center;}
.bcard-time{font-size:.55rem;font-weight:800;color:var(--gold);text-shadow:1px 1px 0 rgba(0,0,0,.6);}
/* Canvas : remplit le reste, le bâtiment est parfaitement cadré */
.bcard-cv{width:100%;height:100%;display:block;position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 78%,rgba(0,0,0,.22),rgba(0,0,0,0) 65%);
  border-radius:0 0 11px 11px;}
.ctag{font-size:.54rem;font-weight:800;display:flex;align-items:center;gap:1px;color:#ffd;}
.ctag.no{color:#ff8a65;}
/* Cadenas : overlay SUR L'IMAGE uniquement, jamais sur le titre */
.bcard-lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:rgba(10,6,2,.62);border-radius:0 0 11px 11px;z-index:5;}
.bcard-lock-ico{font-size:1.5rem;filter:drop-shadow(0 2px 2px rgba(0,0,0,.6));}
.bcard-lock-txt{font-size:.6rem;font-weight:800;color:#ffce3a;text-shadow:0 1px 2px rgba(0,0,0,.8);}
.bcard-desc{font-size:.49rem;color:rgba(255,255,255,.55);text-align:center;line-height:1.1;margin-top:2px;}

/* ===== INFO PANEL ===== */
#info{
  position:fixed;left:8px;right:8px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:55;
  background:linear-gradient(180deg,#4a3420,#3a2818);
  border:3px solid var(--ink);border-radius:16px;
  box-shadow:0 4px 0 var(--ink),0 6px 16px var(--shadow);
  padding:10px 12px;display:none;max-width:340px;margin:0 auto;
}
#info.on{display:block;}
.info-row1{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.info-cv{width:46px;height:42px;flex-shrink:0;}
.info-main{flex:1;min-width:0;}
.info-nm{font-size:.85rem;font-weight:800;color:var(--gold);text-shadow:1px 1px 0 rgba(0,0,0,.4);}
.info-lvl{font-size:.58rem;color:rgba(255,255,255,.6);font-weight:700;}
.info-x{width:26px;height:26px;border-radius:8px;background:rgba(0,0,0,.3);border:2px solid var(--ink);color:#fff;font-weight:800;cursor:pointer;flex-shrink:0;}
.hpbar{height:7px;background:rgba(0,0,0,.5);border:1.5px solid var(--ink);border-radius:5px;overflow:hidden;margin:4px 0;}
.hpfill{height:100%;background:linear-gradient(90deg,#66bb6a,#aed581);transition:width .2s;}
.info-stats{display:flex;flex-wrap:wrap;gap:3px 8px;font-size:.62rem;color:#fff;font-weight:700;margin-bottom:6px;}
.info-stats .st{display:flex;align-items:center;gap:2px;}
.info-btns{display:flex;gap:6px;}
.ibtn{flex:1;padding:7px;border-radius:11px;font-weight:800;font-size:.66rem;cursor:pointer;border:2.5px solid var(--ink);box-shadow:0 3px 0 var(--ink);transition:transform .08s;}
.ibtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
.ibtn.up{background:linear-gradient(180deg,#7cc442,#5ba428);color:#fff;}
.ibtn.up:disabled{opacity:.5;}
.ibtn.sell{background:linear-gradient(180deg,#ff8a65,#e64a19);color:#fff;border-color:#8a2a08;box-shadow:0 3px 0 #8a2a08;}

/* ===== TOAST ===== */
#toasts{position:fixed;top:108px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;width:90%;max-width:320px;}
.toast{
  background:linear-gradient(180deg,#4a3420,#3a2818);
  border:2.5px solid var(--ink);border-left:5px solid var(--gold);
  border-radius:11px;padding:6px 13px;font-size:.72rem;font-weight:700;color:#fff;
  box-shadow:0 3px 0 var(--ink),0 4px 10px var(--shadow);
  animation:tin .25s ease-out,tout .4s ease-in 2.4s forwards;text-align:center;
}
.toast.good{border-left-color:#7cc442;}
.toast.bad{border-left-color:#ff5252;}
.toast.epic{border-left-color:#ab47bc;}
@keyframes tin{from{opacity:0;transform:translateY(-10px) scale(.9)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(-8px)}}

/* ===== MODAL ===== */
#modal{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;}
#modal.on{display:flex;}
.modal-box{
  background:linear-gradient(180deg,#4d3622,#3a2818);
  border:4px solid var(--ink);border-radius:22px;
  padding:22px 24px;max-width:330px;text-align:center;
  box-shadow:0 6px 0 var(--ink),0 12px 30px rgba(0,0,0,.7);
  animation:min .3s cubic-bezier(.2,.8,.2,1.2);
}
@keyframes min{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-ico{font-size:2.8rem;margin-bottom:6px;}
.modal-title{font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:8px;text-shadow:2px 2px 0 rgba(0,0,0,.4);}
.modal-txt{font-size:.82rem;color:#fff;line-height:1.5;margin-bottom:16px;font-weight:600;}
.modal-stat{display:flex;justify-content:space-between;font-size:.78rem;color:#fff;font-weight:700;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.modal-stat b{color:var(--gold);}
.modal-btn{
  width:100%;padding:12px;border-radius:14px;font-weight:800;font-size:.92rem;cursor:pointer;
  background:linear-gradient(180deg,#ffce3a,#f0a500);color:var(--ink);
  border:3px solid var(--gold-d);box-shadow:0 4px 0 var(--gold-d);margin-top:8px;
  transition:transform .08s;
}
.modal-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gold-d);}

/* placement hint */
#place-hint{
  position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:45;
  background:linear-gradient(180deg,#4a3420,#3a2818);border:2.5px solid var(--ink);
  border-radius:13px;padding:6px 14px;font-size:.66rem;font-weight:800;color:#fff;
  box-shadow:0 3px 0 var(--ink);display:none;align-items:center;gap:8px;pointer-events:none;
}
#place-hint.on{display:flex;}
#place-hint .ok{color:var(--gold);}
.ph-cancel{pointer-events:auto;background:var(--red);border:2px solid #7a1515;border-radius:8px;padding:2px 8px;color:#fff;font-weight:800;font-size:.62rem;}

/* loading */
#loader{position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,#1a2a4a,#2a1a3a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loader.hide{display:none;}
.load-title{font-size:2.4rem;font-weight:800;color:var(--gold);text-shadow:3px 3px 0 rgba(0,0,0,.4);letter-spacing:2px;}
.load-sub{font-size:.85rem;color:#fff;opacity:.8;font-weight:600;}
.load-spin{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-btn{margin-top:6px;padding:14px 32px;border-radius:16px;font-size:1.1rem;font-weight:800;background:linear-gradient(180deg,#ffce3a,#f0a500);color:var(--ink);border:3px solid var(--gold-d);box-shadow:0 5px 0 var(--gold-d);cursor:pointer;}
.load-btn:active{transform:translateY(2px);box-shadow:0 3px 0 var(--gold-d);}
</style>
</head>
<body>

<div id="game">
  <canvas id="cv"></canvas>
  <canvas id="fx"></canvas>
</div>

<!-- HUD -->
<div id="hud-top">
  <div class="res-pod" id="pod-gold"><span class="res-ico">🪙</span><span class="res-val" id="v-gold">0</span><span class="res-cap" id="c-gold"></span></div>
  <div class="res-pod" id="pod-wood"><span class="res-ico">🪵</span><span class="res-val" id="v-wood">0</span><span class="res-cap" id="c-wood"></span></div>
  <div class="res-pod" id="pod-stone"><span class="res-ico">🪨</span><span class="res-val" id="v-stone">0</span><span class="res-cap" id="c-stone"></span></div>
  <div class="res-pod" id="pod-food"><span class="res-ico">🍖</span><span class="res-val" id="v-food">0</span><span class="res-cap" id="c-food"></span></div>
  <div class="spacer"></div>
</div>
<div id="hud-sub">
  <div class="sub-pod" id="pod-pop"><span class="sub-ico">👥</span><span class="sub-val" id="v-pop">0</span></div>
  <div class="sub-pod lvl" id="pod-lvl"><span class="sub-ico">👑</span><span class="sub-val">Niv. <span id="v-lvl">1</span></span><div class="lvl-bar"><div class="lvl-fill" id="lvl-fill"></div></div></div>
  <div class="sub-pod" id="pod-happy"><span class="sub-ico">😊</span><span class="sub-val" id="v-happy">100%</span></div>
</div>





<!-- toolbar -->
<div id="toolbar">
  <div class="tool-btn primary" id="tb-build"><span class="tool-ico">🔨</span><span class="tool-lbl">Bâtir</span></div>
</div>

<div id="place-hint"><span>Touchez une case <span class="ok">verte</span></span><button class="ph-cancel" id="ph-cancel">Annuler</button></div>

<!-- build drawer -->
<div id="scrim"></div>
<div id="build-panel">
  <div class="bp-grip"></div>
  <div class="bp-head">
    <span class="bp-title">🔨 Construire</span>
    <button class="bp-x" id="bp-x">✕</button>
  </div>
  <div class="bp-tabs" id="bp-tabs"></div>
  <div class="bp-grid" id="bp-grid"></div>
</div>

<!-- info panel -->
<div id="info">
  <div class="info-row1">
    <canvas class="info-cv" id="info-cv" width="92" height="84"></canvas>
    <div class="info-main">
      <div class="info-nm" id="info-nm">—</div>
      <div class="info-lvl" id="info-lvl"></div>
    </div>
    <button class="info-x" id="info-x">✕</button>
  </div>
  <div class="hpbar" id="info-hpbar"><div class="hpfill" id="info-hp"></div></div>
  <div class="info-stats" id="info-stats"></div>
  <div class="info-btns" id="info-btns"></div>
</div>

<!-- toasts / modal -->
<div id="toasts"></div>
<div id="modal"><div class="modal-box" id="modal-box"></div></div>

<!-- loader -->
<div id="loader">

/* ========== UTILS ========== */
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function lerp(a,b,t){return a+(b-a)*t;}
function rnd(a,b){return a+Math.random()*(b-a);}
function irnd(a,b){return Math.floor(a+Math.random()*(b-a+1));}
function dist2(ax,ay,bx,by){var dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;}
function dist(ax,ay,bx,by){return Math.sqrt(dist2(ax,ay,bx,by));}
function easeOut(t){return 1-(1-t)*(1-t);}
function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function hex(c){return c;}
function lerpC(c1,c2,t){
  // c1,c2 = [r,g,b]
  return 'rgb('+Math.round(lerp(c1[0],c2[0],t))+','+Math.round(lerp(c1[1],c2[1],t))+','+Math.round(lerp(c1[2],c2[2],t))+')';
}
function now(){return Date.now();}

/* ========== AUDIO ========== */
var AC=null;
function initAudio(){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
function beep(freq,type,dur,vol,delay){
  if(!AC) return;
  try{
    var t0=AC.currentTime+(delay||0);
    var g=AC.createGain();
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vol||.12,t0+.012);
    g.gain.exponentialRampToValueAtTime(.0008,t0+(dur||.12));
    var o=AC.createOscillator();
    o.type=type||'sine'; o.frequency.value=freq;
    o.connect(g); g.connect(AC.destination);
    o.start(t0); o.stop(t0+(dur||.12)+.04);
  }catch(e){}
}

/* ========== CANVAS ========== */
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var fx=document.getElementById('fx'), fxc=fx.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1, 2);
var VW=0, VH=0;
function resize(){
  VW=window.innerWidth; VH=window.innerHeight;
  cv.width=Math.round(VW*DPR); cv.height=Math.round(VH*DPR);
  cv.style.width=VW+'px'; cv.style.height=VH+'px';
  fx.width=cv.width; fx.height=cv.height;
  fx.style.width=VW+'px'; fx.style.height=VH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  fxc.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

/* ========== CAMERA ========== */
var cam={x:0,y:0,zoom:1,shake:0,shakeX:0,shakeY:0};
function centerCam(){
  // centre la grille
  var cx=(GW/2-GH/2)*TW/2;
  var cy=(GW/2+GH/2)*TH/2;
  cam.x=VW/2 - cx*cam.zoom;
  cam.y=VH/2 - cy*cam.zoom - 40;
}

/* ========== ISO MATH ========== */
// world grid (gx,gy) -> screen (before cam)
function isoX(gx,gy){ return (gx-gy)*TW/2; }
function isoY(gx,gy){ return (gx+gy)*TH/2; }
// to actual screen pixels (with cam)
function sx(gx,gy){ return isoX(gx,gy)*cam.zoom + cam.x + cam.shakeX; }
function sy(gx,gy){ return isoY(gx,gy)*cam.zoom + cam.y + cam.shakeY; }
// screen pixel -> grid (float)
function screenToGrid(px,py){
  var x=(px - cam.x - cam.shakeX)/cam.zoom;
  var y=(py - cam.y - cam.shakeY)/cam.zoom;
  var gx=(x/(TW/2) + y/(TH/2))/2;
  var gy=(y/(TH/2) - x/(TW/2))/2;
  return {x:gx, y:gy};
}
function cellAt(px,py){
  var g=screenToGrid(px,py);
  var cx=Math.floor(g.x), cy=Math.floor(g.y);
  if(cx<0||cy<0||cx>=GW||cy>=GH) return null;
  return {x:cx,y:cy};
}

/* ========== DRAW PRIMITIVES (cartoon iso) ========== */
var OUT='#2a1a0a';  // contour
function setOut(c,w){c.strokeStyle=OUT;c.lineWidth=w;c.lineJoin='round';c.lineCap='round';}

// diamant (face sol iso)
function diamond(c,cx,cy,w,h,fill,stroke,lw){
  c.beginPath();
  c.moveTo(cx,cy-h/2); c.lineTo(cx+w/2,cy); c.lineTo(cx,cy+h/2); c.lineTo(cx-w/2,cy);
  c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){setOut(c,lw||1.5);c.strokeStyle=stroke;c.stroke();}
}
// boite 3D iso (cube) : base au point (cx,cy), hauteur h
function prism(c,cx,cy,w,d,h,top,left,right){
  // w = largeur en X iso, d = profondeur Y iso, h = hauteur px
  var hw=w/2, hd=d/2;
  // points base
  var bx=cx, by=cy;
  var pT={x:bx, y:by-(hw*TH/TW)-(hd*TH/TW)}; // approx, on dessine manuel
  // simplifié : dessiner faces
  // face gauche (vers -x)
  c.beginPath();
  c.moveTo(cx-hw, cy- h);
  c.lineTo(cx,    cy- h + hd*0.5*(TH/ (TW)) *0); // placeholder
  c.closePath();
  // -> on remplace par dessin direct ci-dessous
}
// On utilise une version plus simple et fiable : maison "blocky" iso
// box(cx,cy, wTop, hBody, depthShade) dessine un volume iso correct
function isoBox(c,cx,cy,wx,wy,hgt,colTop,colL,colR){
  var topY=cy-hgt;
  // face dessus
  c.beginPath();
  c.moveTo(cx, topY-wy);
  c.lineTo(cx+wx, topY);
  c.lineTo(cx, topY+wy);
  c.lineTo(cx-wx, topY);
  c.closePath();
  c.fillStyle=colTop; c.fill(); setOut(c,1.6); c.stroke();
  // face droite
  c.beginPath();
  c.moveTo(cx+wx, topY);
  c.lineTo(cx+wx, cy);
  c.lineTo(cx, cy+wy);
  c.lineTo(cx, topY+wy);
  c.closePath();
  c.fillStyle=colR; c.fill(); setOut(c,1.6); c.stroke();
  // face gauche
  c.beginPath();
  c.moveTo(cx-wx, topY);
  c.lineTo(cx-wx, cy);
  c.lineTo(cx, cy+wy);
  c.lineTo(cx, topY+wy);
  c.closePath();
  c.fillStyle=colL; c.fill(); setOut(c,1.6); c.stroke();
  // ── LISERÉ DE LUMIÈRE sur l'arête haut-gauche (catch light) ──
  if(wx>3){
    c.strokeStyle='rgba(255,255,255,0.28)'; c.lineWidth=1.4; c.lineJoin='round';
    c.beginPath(); c.moveTo(cx-wx,topY); c.lineTo(cx,topY-wy); c.stroke();
    // arête verticale gauche éclairée
    c.strokeStyle='rgba(255,255,255,0.14)'; c.lineWidth=1.2;
    c.beginPath(); c.moveTo(cx-wx,topY); c.lineTo(cx-wx,cy); c.stroke();
  }
}
// toit pyramidal iso
function isoRoof(c,cx,cy,wx,wy,rh,col,colSide){
  var apexY=cy-rh;
  // face droite (ombre)
  c.beginPath();
  c.moveTo(cx, apexY); c.lineTo(cx+wx, cy); c.lineTo(cx, cy+wy); c.closePath();
  c.fillStyle=colSide; c.fill(); setOut(c,1.6); c.stroke();
  // face gauche (lumière)
  c.beginPath();
  c.moveTo(cx, apexY); c.lineTo(cx-wx, cy); c.lineTo(cx, cy+wy); c.closePath();
  c.fillStyle=col; c.fill(); setOut(c,1.6); c.stroke();
  // liseré lumineux sur l'arête gauche du toit
  if(wx>4){
    c.strokeStyle='rgba(255,255,255,0.30)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(cx,apexY); c.lineTo(cx-wx,cy); c.stroke();
  }
}
function circle(c,cx,cy,r,fill,stroke,lw){
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2);
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){setOut(c,lw||1.4);c.strokeStyle=stroke;c.stroke();}
}
function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
function flag(c,cx,cy,h,col){
  setOut(c,1.6); c.strokeStyle=OUT;
  c.beginPath(); c.moveTo(cx,cy); c.lineTo(cx,cy-h); c.stroke();
  c.beginPath();
  c.moveTo(cx,cy-h); c.lineTo(cx+h*.55,cy-h+h*.16); c.lineTo(cx,cy-h+h*.32); c.closePath();
  c.fillStyle=col; c.fill(); c.stroke();
}

var TERR={}; // "x,y" -> {type, deco}
function genWorld(){
  for(var y=0;y<GH;y++) for(var x=0;x<GW;x++){
    var n=hashNoise(x,y);
    var t='grass';
    if(n<0.06) t='water';
    else if(n<0.12) t='dirt';
    TERR[key(x,y)]={type:t, v:n};
  }
  // pas d'eau au centre (zone château)
  var cx=Math.floor(GW/2), cy=Math.floor(GH/2);
  for(var dy=-2;dy<=2;dy++) for(var dx=-2;dx<=2;dx++){
    var k=key(cx+dx,cy+dy); if(TERR[k]) TERR[k].type='grass';
  }
}
function hashNoise(x,y){
  var h=(x*374761393 + y*668265263) ^ 0x5bf03635;
  h=(h^(h>>13))*1274126177; h=h^(h>>16);
  return ((h>>>0)%1000)/1000;
}

    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.life-=p.decay;
    if(p.life<=0) G.particles.splice(i,1);

  for(var j=G.texts.length-1;j>=0;j--){

/* ========== SKY MAGNIFIQUE (soleil/lune en arc) ========== */
// Palettes riches : [haut, milieu, horizon]
var SKY={
  midnight:[[12,14,38],[22,22,54],[34,32,68]],
  night:[[18,20,52],[32,30,72],[52,44,92]],
  dawn:[[60,70,130],[200,130,140],[255,200,150]],
  morning:[[90,150,220],[160,200,235],[230,230,210]],
  day:[[78,162,228],[140,200,240],[200,232,248]],
  noon:[[70,158,230],[135,198,242],[195,230,250]],
  dusk:[[70,60,120],[220,110,90],[255,170,110]],
  twilight:[[40,38,90],[120,70,110],[230,130,110]]
};
function skyColors(){
  var t=G.tod;
  var a,b,f;
  if(t<0.18){ a=SKY.midnight; b=SKY.night; f=t/0.18; }
  else if(t<0.26){ a=SKY.night; b=SKY.dawn; f=(t-0.18)/0.08; }
  else if(t<0.34){ a=SKY.dawn; b=SKY.morning; f=(t-0.26)/0.08; }
  else if(t<0.44){ a=SKY.morning; b=SKY.day; f=(t-0.34)/0.10; }
  else if(t<0.58){ a=SKY.day; b=SKY.noon; f=(t-0.44)/0.14; }
  else if(t<0.68){ a=SKY.noon; b=SKY.day; f=(t-0.58)/0.10; }
  else if(t<0.76){ a=SKY.day; b=SKY.dusk; f=(t-0.68)/0.08; }
  else if(t<0.84){ a=SKY.dusk; b=SKY.twilight; f=(t-0.76)/0.08; }
  else if(t<0.92){ a=SKY.twilight; b=SKY.night; f=(t-0.84)/0.08; }
  else { a=SKY.night; b=SKY.midnight; f=(t-0.92)/0.08; }
  return [lerpC(a[0],b[0],f), lerpC(a[1],b[1],f), lerpC(a[2],b[2],f)];
}
function isNightSky(){ return G.tod<0.26||G.tod>0.84; }
// Position du soleil en arc (retourne {x,y,vis})
function sunPos(){
  // jour visible de 0.24 à 0.78
  var t=G.tod;
  var prog=(t-0.24)/0.54; // 0 au lever, 1 au coucher
  var vis=clamp(prog<0?0:(prog>1?0:1),0,1);
  // fondu aux extrémités
  var a=clamp((t-0.22)/0.06,0,1)*clamp((0.80-t)/0.06,0,1);
  var x=lerp(VW*0.08, VW*0.92, clamp(prog,0,1));
  var y=VH*0.62 - Math.sin(clamp(prog,0,1)*Math.PI)*VH*0.52;
  return {x:x,y:y,a:a,prog:clamp(prog,0,1)};
}
function moonPos(){
  // lune : opposée, visible la nuit (0.76 -> 0.26 en passant par minuit)
  var t=G.tod;
  var mt = t>0.5 ? t-0.76 : t+0.24; // décale
  var prog=mt/0.5;
  var a=clamp((t-0.74)/0.06,0,1); if(t<0.30) a=clamp((0.32-t)/0.06,0,1); if(t>=0.30&&t<=0.74) a=0;
  var x=lerp(VW*0.10, VW*0.90, clamp(prog,0,1));
  var y=VH*0.60 - Math.sin(clamp(prog,0,1)*Math.PI)*VH*0.50;
  return {x:x,y:y,a:a};
}
// direction d'ombre selon le soleil (-1 gauche .. +1 droite)
function sunShadowDir(){
  var s=sunPos();
  if(s.a<0.05){ return {dx:0.5,len:1}; } // nuit : ombre douce
  // soleil à gauche -> ombre à droite
  var nx=(s.x/VW-0.5)*2; // -1..1
  var elev=Math.sin(s.prog*Math.PI); // 0..1 hauteur
  return {dx:-nx, len:lerp(2.2,0.7,elev)};
}

var _stars=null;
function initStars(){
  _stars=[];
  for(var i=0;i<70;i++){
    _stars.push({ x:Math.random(), y:Math.random()*0.55, s:0.5+Math.random()*1.4, tw:Math.random()*6.28, sp:1+Math.random()*2 });
  }
}
var _shootStar={active:false,x:0,y:0,vx:0,vy:0,life:0,next:5};

function drawSky(c){
  var cols=skyColors();
  var g=c.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,cols[0]); g.addColorStop(0.45,cols[1]); g.addColorStop(1,cols[2]);
  c.fillStyle=g; c.fillRect(0,0,VW,VH);

  var T=now()/1000;

  // ── ÉTOILES ──
  if(isNightSky()){
    if(!_stars) initStars();
    var sa=G.tod<0.26 ? clamp((0.26-G.tod)/0.10,0,1) : clamp((G.tod-0.84)/0.10,0,1);
    for(var i=0;i<_stars.length;i++){
      var st=_stars[i];
      var tw=0.35+0.5*Math.sin(T*st.sp+st.tw);
      c.globalAlpha=sa*tw;
      c.fillStyle= i%9===0 ? '#cfe0ff' : '#ffffff';
      c.beginPath(); c.arc(st.x*VW, st.y*VH, st.s,0,Math.PI*2); c.fill();
    }
    c.globalAlpha=1;
    // étoile filante occasionnelle
    if(!_shootStar.active){
      _shootStar.next-=1/60;
      if(_shootStar.next<=0){
        _shootStar.active=true; _shootStar.life=1;
        _shootStar.x=rnd(VW*0.2,VW*0.8); _shootStar.y=rnd(VH*0.05,VH*0.3);
        _shootStar.vx=rnd(3,6); _shootStar.vy=rnd(1.5,3);
        _shootStar.next=rnd(8,20);
      }
    } else {
      _shootStar.x+=_shootStar.vx; _shootStar.y+=_shootStar.vy; _shootStar.life-=0.02;
      if(_shootStar.life<=0) _shootStar.active=false;
      else {
        c.globalAlpha=sa*_shootStar.life;
        var sg2=c.createLinearGradient(_shootStar.x,_shootStar.y,_shootStar.x-_shootStar.vx*6,_shootStar.y-_shootStar.vy*6);
        sg2.addColorStop(0,'#fff'); sg2.addColorStop(1,'rgba(255,255,255,0)');
        c.strokeStyle=sg2; c.lineWidth=2; c.lineCap='round';
        c.beginPath(); c.moveTo(_shootStar.x,_shootStar.y); c.lineTo(_shootStar.x-_shootStar.vx*6,_shootStar.y-_shootStar.vy*6); c.stroke();
        c.globalAlpha=1;
      }
    }
  }

  // ── LUNE ──
  var mp=moonPos();
  if(mp.a>0.02){
    c.globalAlpha=mp.a;
    // halo
    var mg=c.createRadialGradient(mp.x,mp.y,6,mp.x,mp.y,46);
    mg.addColorStop(0,'rgba(230,235,255,.5)'); mg.addColorStop(1,'rgba(200,210,255,0)');
    c.fillStyle=mg; c.beginPath(); c.arc(mp.x,mp.y,46,0,Math.PI*2); c.fill();
    // disque
    circle(c,mp.x,mp.y,20,'#f2f0e0',null);
    // cratères
    c.fillStyle='rgba(190,192,180,.55)';
    c.beginPath(); c.arc(mp.x-6,mp.y-4,4,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(mp.x+5,mp.y+5,3,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(mp.x+2,mp.y-7,2,0,Math.PI*2); c.fill();
    c.globalAlpha=1;
  }

  // ── SOLEIL avec god rays ──
  var sp=sunPos();
  if(sp.a>0.02){
    c.globalAlpha=sp.a;
    // teinte chaude au lever/coucher
    var lowSun=1-Math.sin(sp.prog*Math.PI); // 1 à l'horizon
    var sunCore = lowSun>0.5 ? '#ffd060' : '#fff3b0';
    var sunGlow = lowSun>0.5 ? 'rgba(255,150,60,' : 'rgba(255,230,140,';
    // god rays (rayons rotatifs)
    c.save();
    c.translate(sp.x,sp.y); c.rotate(T*0.05);
    c.globalAlpha=sp.a*(0.10+0.06*Math.sin(T*0.7));
    c.fillStyle=sunGlow+'0.5)';
    for(var r=0;r<12;r++){
      c.rotate(Math.PI/6);
      c.beginPath(); c.moveTo(0,0);
      c.lineTo(-12, -VH*0.9); c.lineTo(12, -VH*0.9); c.closePath(); c.fill();
    }
    c.restore();
    // halo
    var sgl=c.createRadialGradient(sp.x,sp.y,6,sp.x,sp.y,70);
    sgl.addColorStop(0,sunGlow+'0.9)'); sgl.addColorStop(0.4,sunGlow+'0.4)'); sgl.addColorStop(1,sunGlow+'0)');
    c.fillStyle=sgl; c.beginPath(); c.arc(sp.x,sp.y,70,0,Math.PI*2); c.fill();
    // disque
    circle(c,sp.x,sp.y,19,sunCore,null);
    c.globalAlpha=1;
  }

  // ── NUAGES (parallax, teintés par le soleil) ──
  var cloudTint = sp.a>0.3 ? (1-Math.sin(sp.prog*Math.PI)>0.5?'rgba(255,200,170,':'rgba(255,255,255,') : 'rgba(180,190,220,';
  for(var n=0;n<5;n++){
    var speed=4+n*3;
    var cx2=((T*speed + n*340)%(VW+300))-150;
    var cy2=VH*0.06+n*VH*0.06;
    var calpha=isNightSky()?0.10:lerp(0.35,0.6,(n%3)/2);
    c.globalAlpha=calpha;
    c.fillStyle=cloudTint+'1)';
    cloud(c,cx2,cy2,26+n*7);
  }
  c.globalAlpha=1;
}
function cloud(c,x,y,r){
  c.beginPath();
  c.arc(x,y,r*0.55,0,Math.PI*2);
  c.arc(x+r*0.55,y-r*0.22,r*0.45,0,Math.PI*2);
  c.arc(x+r*1.1,y-r*0.05,r*0.5,0,Math.PI*2);
  c.arc(x+r*1.6,y+r*0.05,r*0.4,0,Math.PI*2);
  c.arc(x+r*0.6,y+r*0.18,r*0.5,0,Math.PI*2);
  c.arc(x+r*1.1,y+r*0.2,r*0.42,0,Math.PI*2);
  c.fill();
}

/* ========== TILE COLORS (assombris la nuit) ========== */
function nightFactor(){
  // 0 = jour plein, 1 = nuit pleine
  var t=G.tod;
  if(t<0.24) return 1;
  if(t<0.34) return 1-(t-0.24)/0.10;
  if(t<0.74) return 0;
  if(t<0.86) return (t-0.74)/0.12;
  return 1;
}
function shade(rgb,f){
  // assombrit vers bleu nuit
  var nr=lerp(rgb[0],rgb[0]*0.45+20,f);
  var ng=lerp(rgb[1],rgb[1]*0.45+25,f);
  var nb=lerp(rgb[2],rgb[2]*0.55+50,f);
  return 'rgb('+Math.round(nr)+','+Math.round(ng)+','+Math.round(nb)+')';
}
var TC={
  grass:[124,196,66], grassS:[94,158,40],
  dirt:[176,140,92], dirtS:[140,108,68],
  water:[74,168,224], waterS:[52,128,184]
};

/* ========== DRAW TILE ENRICHI ========== */
function isWater(x,y){ var t=TERR[key(x,y)]; return t&&t.type==='water'; }
function drawTile(x,y){
  var k=key(x,y); var ter=TERR[k]; if(!ter) return;
  var px=sx(x+0.5,y+0.5), py=sy(x+0.5,y+0.5);
  var nf=nightFactor();
  var z=cam.zoom;
  var w=TW*z, h=TH*z;
  // culling
  if(px<-w||px>VW+w||py<-h*2||py>VH+h*2) return;
  var T=now()/1000;

  // variation de couleur par tuile (bruit doux)
  var vn=ter.v||0.5;
  var top, side;
  if(ter.type==='water'){
    top=shade(TC.water,nf); side=shade(TC.waterS,nf);
  } else if(ter.type==='dirt'){
    var dv=Math.round((vn-0.5)*16);
    top=shade([176+dv,140+dv,92+dv],nf); side=shade(TC.dirtS,nf);
  } else {
    var gv=Math.round((vn-0.5)*22);
    top=shade([124+gv,196+gv*0.7,66+gv*0.5],nf); side=shade(TC.grassS,nf);
  }

  var hov = (G.placing||G.spellMode) && hoverCell && hoverCell.x===x && hoverCell.y===y;
  var dh=5*z;
  // côté (profondeur)
  ctx.beginPath();
  ctx.moveTo(px-w/2,py); ctx.lineTo(px,py+h/2); ctx.lineTo(px+w/2,py);
  ctx.lineTo(px+w/2,py+dh); ctx.lineTo(px,py+h/2+dh); ctx.lineTo(px-w/2,py+dh);
  ctx.closePath(); ctx.fillStyle=side; ctx.fill();
  // dessus
  ctx.beginPath();
  ctx.moveTo(px,py-h/2); ctx.lineTo(px+w/2,py); ctx.lineTo(px,py+h/2); ctx.lineTo(px-w/2,py);
  ctx.closePath(); ctx.fillStyle=top; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1; ctx.stroke();

  if(ter.type==='water'){
    // eau animée : 2-3 vaguelettes scintillantes
    var shimmer=0.18*(1-nf);
    for(var wv=0;wv<2;wv++){
      var ph=T*1.2 + x*0.7 + y*0.5 + wv*2;
      var wy3=py + Math.sin(ph)*h*0.12 + (wv-0.5)*h*0.22;
      var wx3=Math.cos(ph*0.8)*w*0.12;
      ctx.strokeStyle='rgba(255,255,255,'+(shimmer*(0.6+0.4*Math.sin(ph)))+')';
      ctx.lineWidth=1.3*z;
      ctx.beginPath(); ctx.moveTo(px-7*z+wx3,wy3); ctx.lineTo(px+7*z+wx3,wy3); ctx.stroke();
    }
    // écume sur les bords terre/eau
    if(z>0.5){
      ctx.strokeStyle='rgba(230,245,255,'+(0.5*(1-nf))+')'; ctx.lineWidth=2*z;
      if(!isWater(x-1,y)){ ctx.beginPath(); ctx.moveTo(px-w/2,py); ctx.lineTo(px,py-h/2); ctx.stroke(); }
      if(!isWater(x,y-1)){ ctx.beginPath(); ctx.moveTo(px,py-h/2); ctx.lineTo(px+w/2,py); ctx.stroke(); }
    }
  } else if(ter.type==='grass' && z>0.55){
    // touffes d'herbe (déterministes par tuile)
    var gh=hashNoise(x*5+3,y*9+1);
    if(gh>0.55){
      var n=2+Math.floor(gh*3);
      ctx.strokeStyle=shade([70,130,40],nf); ctx.lineWidth=1.2*z; ctx.lineCap='round';
      for(var t2=0;t2<n;t2++){
        var ox=(hashNoise(x*7+t2,y*3+t2)-0.5)*w*0.5;
        var oy=(hashNoise(x*2+t2,y*8+t2)-0.5)*h*0.4;
        var sway=Math.sin(T*1.5+x+y+t2)*1.2*z;
        ctx.beginPath(); ctx.moveTo(px+ox,py+oy); ctx.lineTo(px+ox+sway,py+oy-4*z); ctx.stroke();
      }
    }
  }

  if(hov){
    var canB=canPlaceAt(x,y);
    var pulse=0.32+0.16*Math.sin(T*5);
    ctx.fillStyle=canB?'rgba(130,255,140,'+pulse+')':'rgba(255,90,90,'+pulse+')';
    ctx.beginPath();
    ctx.moveTo(px,py-h/2); ctx.lineTo(px+w/2,py); ctx.lineTo(px,py+h/2); ctx.lineTo(px-w/2,py);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=canB?'rgba(180,255,190,.9)':'rgba(255,150,150,.9)'; ctx.lineWidth=2.5;
    ctx.stroke();
  }
}

// ── ARBRE LUXURIANT réutilisable (feuillu ou sapin) ──
function drawLushTree(c, tx, ty, ts, nf, pine, seed){
  // ombre contact
  c.fillStyle='rgba(15,25,10,'+lerp(0.22,0.12,nf)+')';
  c.beginPath(); c.ellipse(tx,ty+1*ts,7*ts,2.6*ts,0,0,Math.PI*2); c.fill();
  // tronc
  c.fillStyle=shade([95,62,34],nf);
  c.beginPath();
  c.moveTo(tx-1.5*ts,ty+1*ts); c.lineTo(tx-1*ts,ty-6*ts); c.lineTo(tx+1*ts,ty-6*ts); c.lineTo(tx+1.5*ts,ty+1*ts); c.closePath(); c.fill();
  if(pine){
    // sapin : 3 étages triangulaires
    for(var lvl=0;lvl<3;lvl++){
      var ly=ty-4*ts-lvl*6*ts;
      var lw=(8-lvl*2)*ts;
      c.fillStyle=shade([38,100+lvl*8,32],nf);
      c.beginPath(); c.moveTo(tx,ly-7*ts); c.lineTo(tx+lw,ly); c.lineTo(tx-lw,ly); c.closePath(); c.fill();
      // côté éclairé
      c.fillStyle=shade([55,128+lvl*8,42],nf);
      c.beginPath(); c.moveTo(tx,ly-7*ts); c.lineTo(tx-lw,ly); c.lineTo(tx-lw*0.3,ly); c.closePath(); c.fill();
    }
  } else {
    // feuillu : boule en couches
    c.fillStyle=shade([40,105,30],nf);
    c.beginPath(); c.arc(tx,ty-8*ts,7.5*ts,0,Math.PI*2); c.fill();
    c.fillStyle=shade([52,128,38],nf);
    c.beginPath(); c.arc(tx-2*ts,ty-9*ts,5.5*ts,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(tx+3*ts,ty-7*ts,4.5*ts,0,Math.PI*2); c.fill();
    // reflet (lumière haut-gauche)
    c.fillStyle=shade([78,160,55],nf);
    c.beginPath(); c.arc(tx-3*ts,ty-11*ts,3*ts,0,Math.PI*2); c.fill();
    // quelques fruits/fleurs occasionnels
    if(seed%5===0 && nf<0.5){
      c.fillStyle='#ff5a4a';
      c.beginPath(); c.arc(tx+2*ts,ty-7*ts,1*ts,0,Math.PI*2); c.fill();
      c.beginPath(); c.arc(tx-4*ts,ty-9*ts,1*ts,0,Math.PI*2); c.fill();
    }
  }
}

/* décorations sol (arbres, buissons, fleurs, rochers) */
function drawDeco(x,y){
  var k=key(x,y); var ter=TERR[k]; if(!ter||ter.type!=='grass') return;
  if(buildingAt(x,y)) return;
  var hsh=hashNoise(x*3+1,y*7+2);
  var px=sx(x+0.5,y+0.5), py=sy(x+0.5,y+0.5);
  var z=cam.zoom; var nf=nightFactor();
  if(px<-40||px>VW+40||py<-40||py>VH+40) return;
  if(hsh>0.90){
    // grand arbre
    var pine=hashNoise(x*11+5,y*13+9)>0.6;
    drawLushTree(ctx,px,py,z*1.15,nf,pine,x+y);
  } else if(hsh<0.04){
    // rocher (avec mousse)
    var s2=z;
    ctx.fillStyle='rgba(15,20,10,'+lerp(0.2,0.1,nf)+')'; ctx.beginPath(); ctx.ellipse(px,py+1*s2,6*s2,2.4*s2,0,0,Math.PI*2); ctx.fill();
    isoBox(ctx,px,py,7*s2,3.5*s2,5*s2,shade([175,170,160],nf),shade([120,114,106],nf),shade([148,142,134],nf));
    // mousse verte sur le dessus
    ctx.fillStyle=shade([70,120,50],nf); ctx.globalAlpha=0.6;
    ctx.beginPath(); ctx.ellipse(px-1*s2,py-4*s2,3*s2,1.5*s2,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  } else if(hsh>0.55 && hsh<0.62){
    // buisson
    if(z>0.5){
      ctx.fillStyle='rgba(15,20,10,'+lerp(0.18,0.1,nf)+')'; ctx.beginPath(); ctx.ellipse(px,py+1*z,5*z,2*z,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=shade([45,110,35],nf);
      ctx.beginPath(); ctx.arc(px-2*z,py-2*z,3.2*z,0,Math.PI*2); ctx.arc(px+2*z,py-2*z,3.2*z,0,Math.PI*2); ctx.arc(px,py-4*z,3*z,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=shade([62,135,45],nf);
      ctx.beginPath(); ctx.arc(px-1*z,py-4*z,2*z,0,Math.PI*2); ctx.fill();
      // baies
      if((x+y)%3===0){ ctx.fillStyle='#e0407a'; ctx.beginPath(); ctx.arc(px+2*z,py-2*z,0.9*z,0,Math.PI*2); ctx.fill(); }
    }
  } else if(hsh>0.40 && hsh<0.50){
    // touffe de fleurs colorées
    if(z>0.5){
      var cols=['#ff5a5a','#ffd23a','#e060c0','#6aa0ff','#ffffff'];
      for(var fi=0;fi<3;fi++){
        var fx2=px+(hashNoise(x*3+fi,y+fi)-0.5)*10*z;
        var fy2=py+(hashNoise(x+fi,y*3+fi)-0.5)*5*z;
        ctx.strokeStyle=shade([50,110,40],nf); ctx.lineWidth=1*z;
        ctx.beginPath(); ctx.moveTo(fx2,fy2); ctx.lineTo(fx2,fy2-3*z); ctx.stroke();
        var col=cols[(x+y+fi)%cols.length];
        ctx.fillStyle=nf>0.5?shade([100,100,110],nf):col;
        circle(ctx,fx2,fy2-3.5*z,1.6*z,null,null);
        ctx.fillStyle='rgba(255,250,200,'+(1-nf)*0.8+')'; circle(ctx,fx2,fy2-3.5*z,0.6*z,null,null);
      }
    }
  }
}

/* ========== MAIN RENDER ========== */
var hoverCell=null;
/* ── TERRAIN ÉTENDU : forêt autour de la carte ── */
function drawForestTile(gx,gy){
  var px=sx(gx+0.5,gy+0.5), py=sy(gx+0.5,gy+0.5);
  var z=cam.zoom,w=TW*z,h=TH*z,dh=5*z;
  // culling rapide
  if(px<-w*2||px>VW+w*2||py<-h*4||py>VH+h) return;
  var nf=nightFactor();
  var top=shade([56,100,38],nf), side=shade([38,72,24],nf);
  // côté
  ctx.beginPath();ctx.moveTo(px-w/2,py);ctx.lineTo(px,py+h/2);ctx.lineTo(px+w/2,py);
  ctx.lineTo(px+w/2,py+dh);ctx.lineTo(px,py+h/2+dh);ctx.lineTo(px-w/2,py+dh);
  ctx.closePath();ctx.fillStyle=side;ctx.fill();
  // dessus
  ctx.beginPath();ctx.moveTo(px,py-h/2);ctx.lineTo(px+w/2,py);ctx.lineTo(px,py+h/2);ctx.lineTo(px-w/2,py);
  ctx.closePath();ctx.fillStyle=top;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=0.6;ctx.stroke();
  // arbres luxuriants (couches + lumière) — type varié
  if(z>0.42){
    var hsh=hashNoise(gx*3+7,gy*5+2);
    if(hsh>0.26){
      var tx=px+(hsh-.5)*w*.55, ty=py+(hashNoise(gx+1,gy+3)-.5)*h*.28;
      var ts=z*(0.6+hsh*.5);
      var pine = hashNoise(gx*11+5,gy*13+9) > 0.62;
      drawLushTree(ctx, tx, ty, ts, nf, pine, gx*2+gy);
    }
  }
}
function drawSurroundingForest(){
  var marge=4;
  for(var gy=-marge;gy<GH+marge;gy++){
    for(var gx=-marge;gx<GW+marge;gx++){
      if(gx>=0&&gx<GW&&gy>=0&&gy<GH) continue;
      // visible ?
      var px=sx(gx+0.5,gy+0.5),py=sy(gx+0.5,gy+0.5);
      if(px<-TW*cam.zoom*2||px>VW+TW*cam.zoom*2) continue;
      if(py<-TH*cam.zoom*4||py>VH+TH*cam.zoom) continue;
      drawForestTile(gx,gy);
    }
  }
}
/* ── LIMITE CAMÉRA ── */
function clampCam(){
  // Le château (centre) doit rester visible
  var minVisX=sx(0,0)-TW*cam.zoom*2;
  var maxVisX=sx(GW,GH)+TW*cam.zoom*2;
  var minVisY=sy(GW,0)-TH*cam.zoom*2;
  var maxVisY=sy(0,GH)+TH*cam.zoom*2;
  // empêche de partir trop loin : le grid doit intersect l'écran
  var margin=TW*cam.zoom*3;
  if(sx(GW/2,GH/2)<-margin) cam.x+=(-margin-sx(GW/2,GH/2))*.15;
  if(sx(GW/2,GH/2)>VW+margin) cam.x-=(sx(GW/2,GH/2)-VW-margin)*.15;
  if(sy(GW/2,GH/2)<-margin) cam.y+=(-margin-sy(GW/2,GH/2))*.15;
  if(sy(GW/2,GH/2)>VH+margin*2) cam.y-=(sy(GW/2,GH/2)-VH-margin*2)*.15;
}

// ── SYSTÈME DE VIE AMBIANTE ──
var ambient={birds:[],flies:[],motes:[],leaves:[],init:false};
function initAmbient(){
  ambient.init=true;
  var i;
  for(i=0;i<10;i++) ambient.motes.push({x:Math.random()*VW,y:Math.random()*VH,sp:rnd(0.1,0.4),ph:Math.random()*6.28,sz:rnd(0.8,2)});
  for(i=0;i<8;i++) ambient.flies.push({x:Math.random()*VW,y:rnd(VH*0.3,VH*0.85),vx:rnd(-0.3,0.3),vy:rnd(-0.3,0.3),ph:Math.random()*6.28});
  for(i=0;i<5;i++) ambient.leaves.push(newLeaf());
}
function newLeaf(){ return {x:rnd(0,VW),y:rnd(-40,-5),vx:rnd(-0.4,0.2),vy:rnd(0.4,0.9),rot:Math.random()*6.28,vr:rnd(-0.05,0.05),sz:rnd(2.5,4),col:['#d4882a','#c0631a','#a83818','#d4a82a'][Math.floor(Math.random()*4)]}; }
function spawnBird(){
  var dir=Math.random()<0.5?1:-1;
  ambient.birds.push({ x:dir>0?-30:VW+30, y:rnd(VH*0.08,VH*0.32), vx:dir*rnd(1.2,2.2), flap:Math.random()*6.28, sz:rnd(0.7,1.2) });
}
var _birdTimer=3;
function updateAmbient(dt){
  if(!ambient.init) initAmbient();
  var T=now()/1000;
  var ds=dt/16.67;
  // oiseaux (jour surtout)
  _birdTimer-=dt/1000;
  if(_birdTimer<=0 && ambient.birds.length<4 && !isNightSky()){ spawnBird(); _birdTimer=rnd(4,12); }
  if(_birdTimer<=0){ _birdTimer=rnd(4,12); }
  for(var i=ambient.birds.length-1;i>=0;i--){
    var b=ambient.birds[i]; b.x+=b.vx*ds; b.flap+=0.3*ds;
    if(b.x<-50||b.x>VW+50) ambient.birds.splice(i,1);
  }
  // pollen / motes
  for(var m=0;m<ambient.motes.length;m++){
    var mo=ambient.motes[m]; mo.ph+=0.02*ds;
    mo.y-=mo.sp*ds; mo.x+=Math.sin(mo.ph)*0.3*ds;
    if(mo.y<-5){ mo.y=VH+5; mo.x=Math.random()*VW; }
  }
  // papillons/lucioles
  for(var f=0;f<ambient.flies.length;f++){
    var fl=ambient.flies[f]; fl.ph+=0.05*ds;
    fl.vx+=Math.sin(fl.ph)*0.04; fl.vy+=Math.cos(fl.ph*0.7)*0.04;
    fl.vx=clamp(fl.vx,-0.6,0.6); fl.vy=clamp(fl.vy,-0.6,0.6);
    fl.x+=fl.vx*ds; fl.y+=fl.vy*ds;
    if(fl.x<0)fl.x=VW; if(fl.x>VW)fl.x=0; if(fl.y<VH*0.25)fl.vy=Math.abs(fl.vy); if(fl.y>VH*0.9)fl.vy=-Math.abs(fl.vy);
  }
  // feuilles
  for(var l=ambient.leaves.length-1;l>=0;l--){
    var lf=ambient.leaves[l]; lf.x+=lf.vx*ds; lf.y+=lf.vy*ds; lf.rot+=lf.vr*ds;
    lf.vx+=Math.sin(lf.y*0.05)*0.02;
    if(lf.y>VH+10){ ambient.leaves[l]=newLeaf(); }
  }
}
function drawAmbientBack(c){
  // derrière le monde : oiseaux dans le ciel
  var T=now()/1000;
  for(var i=0;i<ambient.birds.length;i++){
    var b=ambient.birds[i];
    var flap=Math.sin(b.flap)*4*b.sz;
    c.strokeStyle='rgba(40,40,55,0.7)'; c.lineWidth=2*b.sz; c.lineCap='round';
    var d=b.vx>0?1:-1;
    c.beginPath();
    c.moveTo(b.x-6*b.sz*d, b.y+flap);
    c.quadraticCurveTo(b.x, b.y-2*b.sz, b.x, b.y);
    c.quadraticCurveTo(b.x, b.y-2*b.sz, b.x+6*b.sz*d, b.y+flap);
    c.stroke();
  }
}
function drawAmbientFront(c){
  var T=now()/1000;
  var nf=nightFactor();
  // pollen doré dans la lumière (jour) ou poussière (nuit faible)
  var moteAlpha = lerp(0.4,0.15,nf);
  var moteCol = nf>0.5 ? '200,210,255' : '255,240,180';
  for(var m=0;m<ambient.motes.length;m++){
    var mo=ambient.motes[m];
    var fade=0.5+0.5*Math.sin(mo.ph*2);
    c.fillStyle='rgba('+moteCol+','+(moteAlpha*fade)+')';
    c.beginPath(); c.arc(mo.x,mo.y,mo.sz,0,Math.PI*2); c.fill();
  }
  // papillons (jour) ou lucioles (nuit)
  for(var f=0;f<ambient.flies.length;f++){
    var fl=ambient.flies[f];
    if(nf>0.5){
      // luciole : point lumineux pulsant
      var pul=0.4+0.6*Math.abs(Math.sin(T*2+f));
      c.save(); c.globalCompositeOperation='lighter';
      var gg=c.createRadialGradient(fl.x,fl.y,0,fl.x,fl.y,6);
      gg.addColorStop(0,'rgba(180,255,120,'+(pul*0.9)+')'); gg.addColorStop(1,'rgba(150,255,80,0)');
      c.fillStyle=gg; c.beginPath(); c.arc(fl.x,fl.y,6,0,Math.PI*2); c.fill();
      c.restore();
      c.fillStyle='rgba(220,255,160,'+pul+')'; c.beginPath(); c.arc(fl.x,fl.y,1.3,0,Math.PI*2); c.fill();
    } else {
      // papillon : 2 ailes qui battent
      var wing=Math.abs(Math.sin(T*8+f))*3+1;
      var cols=['#ff9a3c','#ffd24a','#e88adc','#7ad0ff'];
      c.fillStyle=cols[f%4];
      c.save(); c.translate(fl.x,fl.y); c.rotate(Math.atan2(fl.vy,fl.vx));
      c.beginPath(); c.ellipse(-wing*0.4,-2,wing,3.5,0,0,Math.PI*2); c.fill();
      c.beginPath(); c.ellipse(-wing*0.4,2,wing,3.5,0,0,Math.PI*2); c.fill();
      c.fillStyle='rgba(40,30,20,0.8)'; c.fillRect(-0.6,-2.5,1.2,5);
      c.restore();
    }
  }
  // feuilles qui tombent (jour/automne ambiance)
  if(nf<0.6){
    for(var l=0;l<ambient.leaves.length;l++){
      var lf=ambient.leaves[l];
      c.save(); c.translate(lf.x,lf.y); c.rotate(lf.rot);
      c.globalAlpha=lerp(0.85,0.3,nf);
      c.fillStyle=lf.col;
      c.beginPath(); c.ellipse(0,0,lf.sz,lf.sz*0.5,0,0,Math.PI*2); c.fill();
      c.strokeStyle='rgba(80,40,10,0.5)'; c.lineWidth=0.6;
      c.beginPath(); c.moveTo(-lf.sz,0); c.lineTo(lf.sz,0); c.stroke();
      c.restore();
    }
    c.globalAlpha=1;
  }
}

// ── ÉCLAIRAGE GLOBAL : teinte chaude/froide + vignette ──
var _vignetteCache=null, _vignetteW=0, _vignetteH=0;
function drawLightingOverlay(c){
  var t=G.tod;
  // Couleur de teinte et opacité selon l'heure
  var tint, op;
  if(t<0.22){ tint=[20,30,80]; op=0.32; }              // nuit profonde bleue
  else if(t<0.30){ tint=[255,140,90]; op=lerp(0.32,0.18,(t-0.22)/0.08); } // aube orangée
  else if(t<0.36){ tint=[255,200,140]; op=lerp(0.18,0.06,(t-0.30)/0.06); } // matin doré
  else if(t<0.64){ tint=[255,250,235]; op=0.04; }       // plein jour neutre
  else if(t<0.72){ tint=[255,200,130]; op=lerp(0.04,0.16,(t-0.64)/0.08); } // après-midi doré
  else if(t<0.80){ tint=[255,130,70]; op=lerp(0.16,0.28,(t-0.72)/0.08); }  // coucher ambré
  else if(t<0.88){ tint=[80,50,110]; op=lerp(0.28,0.32,(t-0.80)/0.08); }   // crépuscule violet
  else { tint=[20,30,80]; op=0.32; }                    // nuit
  if(op>0.01){
    c.save();
    c.globalCompositeOperation = (t>0.30&&t<0.72) ? 'soft-light' : 'overlay';
    c.fillStyle='rgba('+tint[0]+','+tint[1]+','+tint[2]+','+op+')';
    c.fillRect(0,0,VW,VH);
    c.restore();
    // multiply léger la nuit pour assombrir
    if(op>0.2){
      c.save(); c.globalCompositeOperation='multiply';
      c.fillStyle='rgba('+Math.round(tint[0]*0.6+30)+','+Math.round(tint[1]*0.6+30)+','+Math.round(tint[2]*0.6+50)+','+(op*0.7)+')';
      c.fillRect(0,0,VW,VH); c.restore();
    }
  }
  // ── VIGNETTE (cache car coûteux) ──
  if(!_vignetteCache || _vignetteW!==VW || _vignetteH!==VH){
    _vignetteW=VW; _vignetteH=VH;
    var oc=document.createElement('canvas'); oc.width=VW; oc.height=VH;
    var occ=oc.getContext('2d');
    var vg=occ.createRadialGradient(VW/2,VH*0.45,Math.min(VW,VH)*0.3,VW/2,VH*0.5,Math.max(VW,VH)*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.28)');
    occ.fillStyle=vg; occ.fillRect(0,0,VW,VH);
    _vignetteCache=oc;
  }
  c.drawImage(_vignetteCache,0,0);
}

function render(){
  var T=now()/1000;
  drawSky(ctx);
  // oiseaux dans le ciel (derrière le terrain)
  drawAmbientBack(ctx);

  // forêt autour (avant les tuiles du royaume)
  drawSurroundingForest();

  // tuiles du royaume (ordre iso)
  for(var y=0;y<GH;y++) for(var x=0;x<GW;x++) drawTile(x,y);
  for(var y2=0;y2<GH;y2++) for(var x2=0;x2<GW;x2++) drawDeco(x2,y2);

  // limite caméra (smooth)
  clampCam();

  // entités triées par profondeur
  var ents=[];
  var i;
  for(i=0;i<G.buildings.length;i++){ var b=G.buildings[i]; ents.push({d:b.x+b.y+0.5, kind:'b', o:b}); }
  for(i=0;i<G.villagers.length;i++){ var v=G.villagers[i]; ents.push({d:v.x+v.y, kind:'v', o:v}); }
  ents.sort(function(a,b){return a.d-b.d;});

  for(i=0;i<ents.length;i++){
    var en=ents[i];
    if(en.kind==='b') renderBuilding(en.o,T);
    else if(en.kind==='v') renderVillager(en.o,T);
  }

  // ── CALQUE D'ÉCLAIRAGE GLOBAL (teinte selon l'heure) ──
  drawLightingOverlay(ctx);

  // particules + vie ambiante + textes sur fx canvas
  fxc.clearRect(0,0,VW,VH);
  drawAmbientFront(fxc);
  // anneaux d'onde
  if(G.rings){
    for(var ri=G.rings.length-1;ri>=0;ri--){
      var rg=G.rings[ri];
      rg.r+=(rg.max-rg.r)*0.12; rg.life-=0.04;
      if(rg.life<=0){ G.rings.splice(ri,1); continue; }
      fxc.strokeStyle='rgba('+rg.col+','+rg.life*0.7+')';
      fxc.lineWidth=3*rg.life; 
      fxc.beginPath(); fxc.ellipse(rg.x,rg.y+3,rg.r,rg.r*0.5,0,0,Math.PI*2); fxc.stroke();
    }
  }
  drawParticles(fxc);

  // overlay placement : range preview
  if(G.placing){
    var def=B[G.placing];
    if(def && def.range && hoverCell){
      var px=sx(hoverCell.x+0.5,hoverCell.y+0.5), py=sy(hoverCell.x+0.5,hoverCell.y+0.5);
      fxc.strokeStyle='rgba(255,255,255,.4)'; fxc.lineWidth=2; fxc.setLineDash([6,5]);
      fxc.beginPath(); fxc.ellipse(px,py,def.range*TW/2*cam.zoom,def.range*TH/2*cam.zoom,0,0,Math.PI*2); fxc.stroke();
      fxc.setLineDash([]);
    }
  }
  // bâtiment sélectionné : losange doré animé + portée
  if(G.sel){
    var z=cam.zoom;
    var hx=sx(G.sel.x+0.5,G.sel.y+0.5), hy=sy(G.sel.x+0.5,G.sel.y+0.5);
    var pulse=0.6+0.4*Math.sin(T*4);
    // portée si tour
    if(G.sel.def.range){
      fxc.strokeStyle='rgba(120,200,255,'+(0.35+0.15*Math.sin(T*3))+')'; fxc.lineWidth=2; fxc.setLineDash([7,5]);
      fxc.lineDashOffset=-T*15;
      fxc.beginPath(); fxc.ellipse(hx,hy,G.sel.def.range*TW/2*z,G.sel.def.range*TH/2*z,0,0,Math.PI*2); fxc.stroke();
      fxc.setLineDash([]); fxc.lineDashOffset=0;
    }
    // losange de sélection lumineux
    fxc.save();
    fxc.shadowColor='rgba(255,206,58,0.9)'; fxc.shadowBlur=8;
    fxc.strokeStyle='rgba(255,220,90,'+pulse+')'; fxc.lineWidth=3;
    fxc.beginPath();
    fxc.moveTo(hx,hy-TH/2*z); fxc.lineTo(hx+TW/2*z,hy); fxc.lineTo(hx,hy+TH/2*z); fxc.lineTo(hx-TW/2*z,hy);
    fxc.closePath(); fxc.stroke();
    fxc.restore();
    // 4 coins animés
    var corners=[[0,-TH/2],[TW/2,0],[0,TH/2],[-TW/2,0]];
    fxc.fillStyle='rgba(255,230,120,'+pulse+')';
    for(var ci=0;ci<4;ci++){
      fxc.beginPath(); fxc.arc(hx+corners[ci][0]*z,hy+corners[ci][1]*z,2.5*z,0,Math.PI*2); fxc.fill();
    }
  }
}

function renderBuilding(b,T){
  var px=sx(b.x+0.5,b.y+0.5), py=sy(b.x+0.5,b.y+0.5);
  var z=cam.zoom;
  // ombre portée dynamique (suit le soleil)
  var sh=sunShadowDir();
  var nf=nightFactor();
  var shAlpha=lerp(0.28,0.16,nf);
  ctx.save();
  ctx.fillStyle='rgba(20,15,30,'+shAlpha+')';
  ctx.beginPath();
  ctx.ellipse(px+sh.dx*8*z*sh.len, py+3*z, 15*z*Math.max(1,sh.len*0.85), 5.5*z, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  if(!b.built){
    var pr=b.prog;
    var T2=now()/1000+b.seed;
    var z2=cam.zoom;

    // ── Sol chantier ──
    ctx.fillStyle='rgba(120,90,50,.25)';
    ctx.beginPath(); ctx.ellipse(px,py+2*z2,16*z2,6*z2,0,0,Math.PI*2); ctx.fill();

    // ── Bâtiment en construction (alpha progressif) ──
    ctx.save(); ctx.globalAlpha=pr*0.75;
    b.def.draw(ctx,px,py,z2,b.level,T2);
    ctx.restore();

    // ── Échafaudage ──
    ctx.save(); ctx.globalAlpha=clamp(1-pr*1.5,0,0.9);
    var sw=18*z2, sh=22*z2;
    setOut(ctx,1.4); ctx.strokeStyle='#c8a060';
    // poteaux
    ctx.beginPath(); ctx.moveTo(px-sw,py-sh); ctx.lineTo(px-sw,py+2*z2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+sw,py-sh); ctx.lineTo(px+sw,py+2*z2); ctx.stroke();
    // traverses
    ctx.lineWidth=1*z2;
    for(var si=0;si<3;si++){ var sy3=py-sh+si*sh*.38; ctx.beginPath(); ctx.moveTo(px-sw,sy3); ctx.lineTo(px+sw,sy3); ctx.stroke(); }
    // planches diagonales
    ctx.strokeStyle='rgba(160,110,50,.5)'; ctx.lineWidth=0.8*z2;
    ctx.beginPath(); ctx.moveTo(px-sw,py-sh); ctx.lineTo(px,py-sh*.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+sw,py-sh); ctx.lineTo(px,py-sh*.3); ctx.stroke();
    ctx.restore();

    // ── Ouvriers animés (simple et safe) ──
    var wa1=T2*0.7, wa2=T2*0.7+Math.PI;
    var wx1=px+Math.cos(wa1)*13*z2, wy1=py+Math.sin(wa1)*6*z2;
    var wx2b=px+Math.cos(wa2)*13*z2, wy2b=py+Math.sin(wa2)*6*z2;
    drawVillager(ctx,wx1,wy1,z2,T2,'#5b8dd0',pr<0.5);
    if(pr<0.8) drawVillager(ctx,wx2b,wy2b,z2,T2+3.14,'#d05b8d',false);
    // poussière
    if(Math.random()<0.03) burst(px+(Math.random()-.5)*10*z2,py,1,{col:'rgba(160,130,90,.4)',size:2,spread:1,vy:-.3,decay:.03,grav:-.005});

    // ── Barre de progression ──
    var bw=50*z2, bh=6*z2, bx=px-bw/2, by2=py+16*z2;
    ctx.fillStyle='rgba(0,0,0,.7)'; rrect(ctx,bx,by2,bw,bh,3); ctx.fill();
    var pg=ctx.createLinearGradient(bx,by2,bx+bw,by2);
    pg.addColorStop(0,'#e8a800'); pg.addColorStop(1,'#f7c815');
    ctx.fillStyle=pg; rrect(ctx,bx,by2,bw*pr,bh,3); ctx.fill();

    // ── Timer formaté ──
    var secs2=Math.ceil((b.buildEnd-now())/1000); if(secs2<0) secs2=0;
    var timerStr=fmtTime(secs2);
    var tw2=(timerStr.length*5.5+8)*z2;
    ctx.fillStyle='rgba(0,0,0,.75)'; rrect(ctx,px-tw2/2,by2-14*z2,tw2,11*z2,3*z2); ctx.fill();
    ctx.font='800 '+(8*z2)+'px sys'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=2; ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.strokeText(timerStr,px,by2-8.5*z2);
    ctx.fillStyle='#f7c815'; ctx.fillText(timerStr,px,by2-8.5*z2);
    return;
  }

  ctx.save();
  if(G.sel===b){ ctx.shadowColor='rgba(255,206,58,.9)'; ctx.shadowBlur=14*z; }
  var hf=b.hurt>0;
  // animation d'apparition (rebond élastique)
  if(b.popAnim>0){
    b.popAnim-=0.04;
    var pa=b.popAnim;
    var squash=1+Math.sin(pa*Math.PI*2)*0.12*pa;
    ctx.translate(px,py); ctx.scale(1/squash, squash); ctx.translate(-px,-py);
  }
  b.def.draw(ctx, px, py, z, b.level, T + b.x*0.3 + b.y*0.2);
  ctx.restore();
  // ── Lampes/feux : grande lumière chaude projetée au sol la nuit ──
  if(b.def.lamp && nf>0.2){
    var lg=nf*(0.6+0.15*Math.sin(T*5+b.seed));
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    var lgr=ctx.createRadialGradient(px,py-2*z,2,px,py-2*z,40*z);
    lgr.addColorStop(0,'rgba(255,210,120,'+(lg*0.55)+')');
    lgr.addColorStop(0.5,'rgba(255,170,70,'+(lg*0.2)+')');
    lgr.addColorStop(1,'rgba(255,150,50,0)');
    ctx.fillStyle=lgr; ctx.beginPath(); ctx.ellipse(px,py-2*z,40*z,20*z,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // ── Lueur chaude des fenêtres la nuit (si visible) ──
  if(nf>0.25 && z>0.5 && !b.def.wall && !b.def.deco && !b.def.lamp){
    var glow=nf*(0.55+0.12*Math.sin(T*3+b.seed));
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=glow*0.5;
    var gg=ctx.createRadialGradient(px,py-8*z,1,px,py-8*z,16*z);
    gg.addColorStop(0,'rgba(255,200,90,0.9)'); gg.addColorStop(1,'rgba(255,170,60,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(px,py-8*z,16*z,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // petits points lumineux (fenêtres)
    ctx.fillStyle='rgba(255,220,130,'+glow+')';
    ctx.beginPath(); ctx.arc(px-4*z,py-9*z,1.3*z,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+4*z,py-9*z,1.3*z,0,Math.PI*2); ctx.fill();
  }

  if(hf){
    ctx.save(); ctx.globalCompositeOperation='source-atop'; ctx.restore();
  }

  // badge niveau
  if(b.level>1){
    var bxx=px+15*z, byy=py-30*z, r=7*z;
    circle(ctx,bxx,byy,r+1.5,'#2a1a0a',null);
    circle(ctx,bxx,byy,r,'#ffce3a',null);
    ctx.fillStyle='#2a1a0a'; ctx.font='800 '+(9*z)+'px sys'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.level,bxx,byy+0.5);
  }
  // barre de vie si endommagé (nuit)
  if(b.hp<b.maxHp){
    var bw2=26*z, bh2=4*z, bx2=px-bw2/2, by2=py+8*z;
    ctx.fillStyle='rgba(0,0,0,.55)'; rrect(ctx,bx2,by2,bw2,bh2,2); ctx.fill();
    var hpf=b.hp/b.maxHp;
    ctx.fillStyle= hpf>0.5?'#7cc442':(hpf>0.25?'#f0a500':'#e74c3c');
    rrect(ctx,bx2,by2,bw2*hpf,bh2,2); ctx.fill();
  }
}
function burstMaybe(px,py,b){
  if(Math.random()<0.08) burst(px,py-6,1,{col:'#caa472',size:2,spread:2,decay:0.04});
}

function renderVillager(v,T){
  var px=sx(v.x,v.y), py=sy(v.x,v.y);
  drawVillager(ctx,px,py,cam.zoom,T+v.seed,v.col,v.carry);
}
function renderTroop(tr,T){
  var px=sx(tr.x,tr.y), py=sy(tr.x,tr.y);
  drawSoldier(ctx,px,py,cam.zoom,T+tr.seed,tr.hurt>0);
  // barre vie
  if(tr.hp<tr.maxHp){
    var z=cam.zoom, bw=14*z, bx=px-bw/2, by=py-18*z;
    ctx.fillStyle='rgba(0,0,0,.5)'; rrect(ctx,bx,by,bw,3*z,1.5); ctx.fill();
    ctx.fillStyle='#7cc442'; rrect(ctx,bx,by,bw*(tr.hp/tr.maxHp),3*z,1.5); ctx.fill();

function renderEnemy(e,T){
  var px=sx(e.x,e.y), py=sy(e.x,e.y);
  var z=cam.zoom;
  var s=z*(e.def.boss?1.3:1)*(e.frozen>0?1:1);
  e.def.draw(ctx,px,py,s,T+e.seed,e.hurt>0);
  if(e.frozen>0){
    ctx.save(); ctx.globalAlpha=0.4;
    circle(ctx,px,py-6*z,10*z*(e.def.boss?1.4:1),'#aee0ff',null);
    ctx.restore();
  }
  // barre vie
  var bw=(e.def.boss?40:16)*z, bx=px-bw/2, by=py-(e.def.boss?34:18)*z;
  ctx.fillStyle='rgba(0,0,0,.55)'; rrect(ctx,bx,by,bw,4*z,2); ctx.fill();
  var hpf=e.hp/e.maxHp;
  ctx.fillStyle= e.def.boss?'#ab47bc':(hpf>0.4?'#ff6b6b':'#e74c3c');
  rrect(ctx,bx,by,bw*hpf,4*z,2); ctx.fill();
}
function renderProjectile(p,T){
  var px=sx(p.x,p.y), py=sy(p.x,p.y)-(p.arc||0);
  var z=cam.zoom;
  if(p.type==='arrow'){
    ctx.save(); ctx.translate(px,py); ctx.rotate(p.ang);
    setOut(ctx,1.6); ctx.strokeStyle='#5a3a1a';
    ctx.beginPath(); ctx.moveTo(-5*z,0); ctx.lineTo(5*z,0); ctx.stroke();
    ctx.fillStyle='#ccc'; ctx.beginPath(); ctx.moveTo(5*z,0); ctx.lineTo(2*z,-2*z); ctx.lineTo(2*z,2*z); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if(p.type==='bomb'){
    circle(ctx,px,py,4*z,'#333',OUT,1.4);
    circle(ctx,px-1*z,py-1*z,1.2*z,'#666',null);
    // mèche
    burst(px,py-3*z,1,{col:'#ff8a2a',size:1.5,spread:0.5,decay:0.08,grav:0});
  } else if(p.type==='magic'){
    var grd=ctx.createRadialGradient(px,py,0,px,py,5*z);
    grd.addColorStop(0,'#fff'); grd.addColorStop(0.5,'#c080ff'); grd.addColorStop(1,'rgba(150,80,255,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(px,py,5*z,0,Math.PI*2); ctx.fill();
  } else if(p.type==='ice'){
    var gi=ctx.createRadialGradient(px,py,0,px,py,5*z);
    gi.addColorStop(0,'#fff'); gi.addColorStop(0.5,'#a0e8ff'); gi.addColorStop(1,'rgba(80,180,255,0)');
    ctx.fillStyle=gi; ctx.beginPath(); ctx.arc(px,py,5*z,0,Math.PI*2); ctx.fill();
  } else if(p.type==='bolt'){
    ctx.save(); ctx.translate(px,py); ctx.rotate(p.ang);
    setOut(ctx,2); ctx.strokeStyle='#c8a060';
    ctx.beginPath(); ctx.moveTo(-7*z,0); ctx.lineTo(7*z,0); ctx.stroke();
    ctx.fillStyle='#e8c880'; ctx.beginPath(); ctx.moveTo(7*z,0); ctx.lineTo(3*z,-3*z); ctx.lineTo(3*z,3*z); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if(p.type==='fireball'){
    var gf=ctx.createRadialGradient(px,py,0,px,py,7*z);
    gf.addColorStop(0,'#fff'); gf.addColorStop(.3,'#ff8a00'); gf.addColorStop(1,'rgba(200,20,0,0)');
    ctx.fillStyle=gf; ctx.beginPath(); ctx.arc(px,py,7*z,0,Math.PI*2); ctx.fill();
  } else if(p.type==='boulder'){
    circle(ctx,px,py,6*z,'#8a7a60',OUT,1.8);
    circle(ctx,px-1.5*z,py-1.5*z,2*z,'#a09080',null);
  }
}

/* ========== PLACEMENT / CONSTRUCTION ========== */
function canPlaceAt(x,y){
  if(x<0||y<0||x>=GW||y>=GH) return false;
  var ter=TERR[key(x,y)];
  if(!ter||ter.type==='water') return false;
  if(buildingAt(x,y)) return false;
  return true;
}
function canAfford(cost){
  for(var r in cost){ if(cost.hasOwnProperty(r)){ if((G.res[r]||0) < cost[r]) return false; } }
  return true;
}
function pay(cost){
  for(var r in cost){ if(cost.hasOwnProperty(r)){ G.res[r]-=cost[r]; } }
}
function startPlacing(type){
  var def=B[type];
  if(!canAfford(def.cost)){ toast('Ressources insuffisantes !','bad'); SFX.err(); return; }
  G.placing=type; G.sel=null; updateInfo();
  closeBuildPanel();
  document.getElementById('place-hint').classList.add('on');
  SFX.select();
}
function cancelPlacing(){
  G.placing=null;
  document.getElementById('place-hint').classList.remove('on');
}
function countUnderConstruction(){
  var n=0; for(var i=0;i<G.buildings.length;i++){ if(!G.buildings[i].built) n++; } return n;
}
function placeBuilding(type,x,y){
  var def=B[type];
  // vérifier les ouvriers disponibles (sauf bâtiments instantanés)
  if(def.build>0){
    var busy=countUnderConstruction();
    if(busy>=G.workers){
      toast('Ouvriers occupés ! '+busy+'/'+G.workers+' — Batissez une Maison Ouvrier 👷','bad');
      SFX.err(); cancelPlacing(); return;
    }
  }
  if(!canAfford(def.cost)){ toast('Ressources insuffisantes !','bad'); SFX.err(); cancelPlacing(); return; }
  pay(def.cost);
  var b={
    type:type, def:def, x:x, y:y, level:1,
    built:def.build<=0, prog:0,
    buildEnd: now()+def.build*1000, buildDur:def.build*1000,
    hp:def.hp, maxHp:def.hp, hurt:0,
    cool:0, // tir
    seed:Math.random()*10
  };
  G.grid[key(x,y)]=b; G.buildings.push(b);
  if(b.built) b.popAnim=1;
  G.stats.built++;
  SFX.build();
  var px=sx(x+0.5,y+0.5), py=sy(x+0.5,y+0.5);
  burst(px,py-6,10,{col:'#ffce3a',size:3,spread:3,decay:0.03});
  burst(px,py-6,6,{col:'#caa472',size:2.5,spread:2.5,decay:0.04});
  floatText(px,py-20,'+'+def.name,'#7cffce',12);
  recomputeStats();
  cancelPlacing();
}
function finishBuild(b){
  b.built=true; b.prog=1;
  b.popAnim=1; // animation d'apparition (rebond)
  var px=sx(b.x+0.5,b.y+0.5), py=sy(b.x+0.5,b.y+0.5);
  // étoiles dorées
  burst(px,py-8,16,{col:'#ffce3a',size:3,spread:4,decay:0.025,shape:'star'});
  // onde de poussière au sol
  for(var d=0;d<10;d++){
    var a=d/10*Math.PI*2;
    spawnP(px,py+2,{vx:Math.cos(a)*2.5,vy:Math.sin(a)*1.2-0.3,col:'rgba(200,180,140,0.7)',size:3,decay:0.04,grav:0.02});
  }
  // anneau lumineux
  G.rings=G.rings||[];
  G.rings.push({x:px,y:py,r:6,max:40,life:1,col:'255,206,58'});
  SFX.up();
  floatText(px,py-24,'✓ Construit !','#ffce3a',13);
  recomputeStats();
  if(b.def.pop) spawnVillagers();
}

function upgradeCost(b){
  var mult=Math.pow(1.8,b.level);
  var forgeDisc = countBuilt('forge')>0 ? 0.85 : 1;
  var c={};
  for(var r in b.def.cost){ if(b.def.cost.hasOwnProperty(r)){ c[r]=Math.round(b.def.cost[r]*mult*forgeDisc*1.4); } }
  if(b.type==='chateau'){ c={gold:Math.round(120*Math.pow(1.7,b.level)), stone:Math.round(60*Math.pow(1.7,b.level)), wood:Math.round(40*Math.pow(1.7,b.level))}; }
  return c;
}
function doUpgrade(b){
  if(b.level>=b.def.max){ toast('Niveau maximum !','bad'); SFX.err(); return; }
  var c=upgradeCost(b);
  if(!canAfford(c)){ toast('Ressources insuffisantes !','bad'); SFX.err(); return; }
  pay(c);
  b.level++;
  b.maxHp=Math.round(b.def.hp*(1+(b.level-1)*0.4));
  b.hp=b.maxHp;
  SFX.up();
  var px=sx(b.x+0.5,b.y+0.5), py=sy(b.x+0.5,b.y+0.5);
  burst(px,py-10,16,{col:'#ffce3a',size:3,spread:4,decay:0.025,shape:'star'});
  floatText(px,py-26,'Niv. '+b.level+' !','#ffce3a',14);
  recomputeStats(); updateInfo();
  if(b.def.pop) spawnVillagers();
}
function sellBuilding(b){
  if(b.type==='chateau'){ toast('Impossible de vendre le Château !','bad'); SFX.err(); return; }
  var refund={};
  for(var r in b.def.cost){ if(b.def.cost.hasOwnProperty(r)){ refund[r]=Math.floor(b.def.cost[r]*b.level*0.5); G.res[r]=Math.min(G.cap[r],(G.res[r]||0)+refund[r]); } }
  removeBuilding(b);
  SFX.coin();
  var px=sx(b.x+0.5,b.y+0.5), py=sy(b.x+0.5,b.y+0.5);
  floatText(px,py-20,'Vendu','#ffce3a',12);
  G.sel=null; updateInfo(); recomputeStats();
}
function removeBuilding(b){
  delete G.grid[key(b.x,b.y)];
  var i=G.buildings.indexOf(b); if(i>=0) G.buildings.splice(i,1);
}
function destroyBuilding(b){
  var px=sx(b.x+0.5,b.y+0.5), py=sy(b.x+0.5,b.y+0.5);
  burst(px,py-6,20,{col:'#888',size:4,spread:4,decay:0.02});
  burst(px,py-6,12,{col:'#caa472',size:3,spread:5,decay:0.03});
  SFX.boom(); shakeCam(8);
  floatText(px,py-20,'Détruit !','#ff5252',13);
  removeBuilding(b);
  if(G.sel===b){ G.sel=null; updateInfo(); }
  recomputeStats();
  if(b.type==='chateau') gameOver(false);
}
function countBuilt(type){
  var n=0; for(var i=0;i<G.buildings.length;i++){ if(G.buildings[i].type===type && G.buildings[i].built) n++; } return n;
}

/* ========== STATS GLOBALES ========== */

function countDeco(){ var n=0; for(var i=0;i<G.buildings.length;i++){ var b=G.buildings[i]; if(b.built&&b.def.deco) n++; } return n; }

function checkAchievements(){

function showAchievement(a){
