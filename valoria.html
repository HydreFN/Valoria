function recomputeStats(){
  var pop=0, cap={gold:400,wood:400,stone:400,food:400}, workers=1;
  var bcount=0, decoCount=0, totalValue=0;
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i]; if(!b.built) continue;
    bcount++;
    if(b.def.pop) pop+=b.def.pop*b.level;
    if(b.def.cap){ cap.gold+=b.def.cap*b.level; cap.wood+=b.def.cap*b.level; cap.stone+=b.def.cap*b.level; cap.food+=b.def.cap*b.level; }
    if(b.def.ouvrier) workers+=b.level;
    if(b.def.deco||b.def.aura) decoCount++;
    // valeur = somme des coûts × niveau (pour le niveau du royaume)
    var cc=b.def.cost; for(var rr in cc){ if(cc.hasOwnProperty(rr)) totalValue+=cc[rr]*b.level; }
  }
  G.popMax=pop;
  G.cap=cap;
  G.workers=Math.min(G.workersMax, workers);
  for(var r in G.res){ if(G.res.hasOwnProperty(r)){ if(G.res[r]>G.cap[r]) G.res[r]=G.cap[r]; } }
  // Niveau du royaume : paliers de valeur
  G.kingdomValue=totalValue;
  var lvl=1, need=300, acc=0;
  while(totalValue>=acc+need && lvl<99){ acc+=need; lvl++; need=Math.round(need*1.35); }
  if(lvl>G.level){ var old=G.level; G.level=lvl; if(G.started&&old>0) onLevelUp(lvl); }
  G.level=lvl;
  G.levelProg=clamp((totalValue-acc)/need,0,1);
  // Bonheur : base 100, +5 par déco/aura, -2 par tranche de 10 pop au-delà de 20
  var happy=100 + decoCount*5 - Math.max(0,Math.floor((pop-20)/10))*3;
  G.happy=clamp(happy,0,200);
  updateHUD();
  checkAchievements();
}
function onLevelUp(lvl){
  toast('👑 Royaume Niveau '+lvl+' !','epic');
  floatText(VW/2,VH*0.4,'NIVEAU '+lvl,'#ffce3a',26);
  if(typeof SFX!=='undefined') SFX.win();
  // gerbe d'étoiles
  for(var i=0;i<20;i++){ spawnP(VW/2,VH*0.4,{vx:rnd(-5,5),vy:rnd(-6,2),col:['#ffce3a','#fff','#ff9a3c'][i%3],size:4,decay:0.02,shape:'star',grav:0.12}); }
}

/* ========== VILLAGEOIS ========== */
var VCOLS=['#5b8dd0','#d05b8d','#8dd05b','#d0a85b','#a85bd0','#5bd0c0'];
function spawnVillagers(){
  // ajuste le nb de villageois ~ popMax/3 (visuel)
  var target=Math.min(14, Math.floor(G.popMax/3));
  while(G.villagers.length<target){
    var cx=GW/2, cy=GH/2;
    G.villagers.push({
      x:cx+rnd(-2,2), y:cy+rnd(-2,2),
      tx:cx, ty:cy, spd:rnd(0.012,0.022),
      col:VCOLS[irnd(0,VCOLS.length-1)], carry:false,
      seed:Math.random()*10, wait:0
    });
  }
  while(G.villagers.length>target){ G.villagers.pop(); }
}
function updateVillagers(){
  if(G.phase==='night'){
    // les villageois rentrent (vont au château)
    for(var i=0;i<G.villagers.length;i++){
      var v=G.villagers[i];
      moveToward(v, GW/2, GH/2, v.spd*1.4);
    }
    return;
  }
  for(var j=0;j<G.villagers.length;j++){
    var vv=G.villagers[j];
    if(vv.wait>0){ vv.wait-=TICK; continue; }
    var dx=vv.tx-vv.x, dy=vv.ty-vv.y;
    if(dx*dx+dy*dy<0.04){
      // arrivé : choisir nouvelle cible (un bâtiment ressource au hasard)
      vv.carry=!vv.carry;
      var targets=G.buildings.filter(function(b){return b.built && (b.def.prod && (b.def.prod.gold||b.def.prod.wood||b.def.prod.food||b.def.prod.stone));});
      if(targets.length && Math.random()<0.7){
        var tb=targets[irnd(0,targets.length-1)];
        vv.tx=tb.x+0.5+rnd(-0.3,0.3); vv.ty=tb.y+0.5+rnd(-0.3,0.3);
      } else {
        vv.tx=GW/2+rnd(-3,3); vv.ty=GH/2+rnd(-3,3);
      }
      vv.wait=rnd(200,800);
    } else {
      moveToward(vv, vv.tx, vv.ty, vv.spd);
    }
  }
}
function moveToward(o,tx,ty,spd){
  var dx=tx-o.x, dy=ty-o.y, d=Math.sqrt(dx*dx+dy*dy);
  if(d<0.001) return true;
  o.x+=dx/d*spd; o.y+=dy/d*spd;
  return d<0.05;
}

/* ========== ÉCONOMIE (tick par seconde) ========== */
var ecoAccum=0;
function economyTick(dt){
  ecoAccum+=dt;
  if(ecoAccum<1000) return;
  ecoAccum-=1000;
  if(G.phase==='night') return; // pas de prod la nuit (optionnel: réduit)

  // calcul production avec boosts
  var prod={gold:0,wood:0,stone:0,food:0};
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i]; if(!b.built||!b.def.prod) continue;
    var mult=b.level;
    // moulin boost fermes
    if(b.type==='ferme'){ if(nearBoost(b,'moulin')) mult*=1.4; }
    // guilde boost marchés
    if(b.type==='marche'||b.type==='mine_or'){ if(nearBoost(b,'guilde')) mult*=1.4; }
    // temple aura
    if(templeAura(b)) mult*=1.15;
    for(var r in b.def.prod){ if(b.def.prod.hasOwnProperty(r)){ prod[r]+=b.def.prod[r]*mult; } }
  }
  // consommation nourriture par pop
  var foodNeed=Math.floor(G.popMax/4);
  prod.food-=foodNeed;

  // applique
  for(var rr in prod){ if(prod.hasOwnProperty(rr)){
    if(prod[rr]!==0){
      G.res[rr]=clamp((G.res[rr]||0)+prod[rr],0,G.cap[rr]);
      if(rr==='gold'&&prod[rr]>0) G.stats.goldEarned+=prod[rr];
    }
  }}
  // pop grandit si nourriture ok
  if(G.res.food>5 && G.pop<G.popMax){ G.pop=Math.min(G.popMax,G.pop+1); }
  else if(G.res.food<=0 && G.pop>0){ G.pop=Math.max(0,G.pop-1); if(Math.random()<0.5) toast('Famine ! Construisez des fermes 🍖','bad'); }

  // régen mana (académie double)
  var manaRegen=countBuilt('academie')>0?4:2;
  G.mana=clamp(G.mana+manaRegen,0,G.manaCap);
  // hôpital heal buildings
  if(countBuilt('hopital')>0){
    var healAmt=countBuilt('hopital')*2;
    for(var hi=0;hi<G.buildings.length;hi++){ var hb=G.buildings[hi]; if(hb.built&&hb.hp<hb.maxHp){ hb.hp=Math.min(hb.maxHp,hb.hp+healAmt); } }
  }

  // anim pièces sur bâtiments or
  if(prod.gold>0){
    var golds=G.buildings.filter(function(b){return b.built && b.def.prod && b.def.prod.gold;});
    if(golds.length){ var gb=golds[irnd(0,golds.length-1)]; var px=sx(gb.x+0.5,gb.y+0.5), py=sy(gb.x+0.5,gb.y+0.5); floatText(px,py-22,'+'+prod.gold+'🪙','#ffce3a',11); SFX.coin(); }
  }
  updateHUD();
}
function nearBoost(b,type){
  for(var i=0;i<G.buildings.length;i++){
    var o=G.buildings[i]; if(o.built && o.type===type){
      if(Math.abs(o.x-b.x)<=1.5 && Math.abs(o.y-b.y)<=1.5) return true;
    }
  }
  return false;
}
function templeAura(b){
  for(var i=0;i<G.buildings.length;i++){
    var o=G.buildings[i]; if(o.built && o.type==='temple'){
      if(Math.abs(o.x-b.x)<=2 && Math.abs(o.y-b.y)<=2) return true;
    }
  }
  return false;
}

/* ========== COMBAT : ENNEMIS ========== */
function enemyTarget(e){
  // cible : bâtiment le plus proche (priorité château si proche)
  var best=null, bd=1e9;
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i]; if(!b.built) continue;
    var d=dist2(e.x,e.y,b.x+0.5,b.y+0.5);
    if(b.type==='chateau') d*=0.6;
    if(b.def.wall) d*=1.3;
    if(d<bd){ bd=d; best=b; }
  }
  return best;
}
function updateEnemies(dt){
  var sdt=dt/1000;
  for(var i=G.enemies.length-1;i>=0;i--){
    var e=G.enemies[i];
    if(e.hurt>0) e.hurt-=dt;
    if(e.frozen>0){ e.frozen-=dt; continue; }
    // cible bâtiment
    if(!e.target || !e.target.built){ e.target=enemyTarget(e); }
    // chercher troupe proche à combattre
    var troopNear=null, tnd=0.6;
    for(var k=0;k<G.troops.length;k++){
      var tr=G.troops[k]; var d=dist2(e.x,e.y,tr.x,tr.y);
      if(d<tnd){ tnd=d; troopNear=tr; }
    }
    if(troopNear){
      // combat troupe
      e.atkCd=(e.atkCd||0)-dt;
      if(e.atkCd<=0){ troopNear.hp-=e.def.dmg; troopNear.hurt=120; e.atkCd=900; SFX.hit();
        var tpx=sx(troopNear.x,troopNear.y); floatText(tpx,sy(troopNear.x,troopNear.y)-16,'-'+e.def.dmg,'#ff8a65',10);
        if(troopNear.hp<=0) killTroop(troopNear);
      }
      continue;
    }
    if(!e.target){ continue; }
    var tx=e.target.x+0.5, ty=e.target.y+0.5;
    var dd=dist(e.x,e.y,tx,ty);
    var reach=0.55+e.def.r;
    if(dd>reach){
      // avancer (les murs ralentissent le pathing : on va tout droit, simple)
      var ang=Math.atan2(ty-e.y,tx-e.x);
      var spd=e.def.spd*sdt;
      e.x+=Math.cos(ang)*spd; e.y+=Math.sin(ang)*spd;
    } else {
      // attaquer bâtiment
      e.atkCd=(e.atkCd||0)-dt;
      if(e.atkCd<=0){
        e.target.hp-=e.def.dmg; e.target.hurt=120; e.atkCd=1000; SFX.hit();
        var bpx=sx(e.target.x+0.5,e.target.y+0.5), bpy=sy(e.target.x+0.5,e.target.y+0.5);
        burst(bpx,bpy-6,4,{col:'#ff6b6b',size:2,spread:2,decay:0.05});
        if(e.target.hp<=0) destroyBuilding(e.target);
      }
    }
  }
}
function damageEnemy(e,dmg,px,py){
  e.hp-=dmg; e.hurt=120;
  if(px!=null) floatText(px,py-14,'-'+Math.round(dmg),'#fff',10);
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  var i=G.enemies.indexOf(e); if(i<0) return;
  G.enemies.splice(i,1);
  var px=sx(e.x,e.y), py=sy(e.x,e.y);
  burst(px,py-6,e.def.boss?24:10,{col:e.def.boss?'#ab47bc':'#8ad04a',size:3,spread:e.def.boss?5:3,decay:0.03});
  G.res.gold=clamp(G.res.gold+e.def.gold,0,G.cap.gold);
  G.stats.goldEarned+=e.def.gold;
  floatText(px,py-16,'+'+e.def.gold+'🪙','#ffce3a',11);
  G.stats.kills++;
  G.wave.killed++;
  SFX.die();
  if(e.def.boss){ shakeCam(10); SFX.boom(); }
}
function killTroop(tr){
  var i=G.troops.indexOf(tr); if(i<0) return;
  G.troops.splice(i,1);
  var px=sx(tr.x,tr.y), py=sy(tr.x,tr.y);
  burst(px,py-6,8,{col:'#4a6fa5',size:2.5,spread:3,decay:0.04});
  SFX.die();
}

/* ========== TOURS (tir) ========== */
function updateTowers(dt){
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i];
    if(!b.built || !b.def.range || !b.def.dmg) continue;
    b.cool-=dt;
    if(b.cool>0) continue;
    // cible : ennemi le plus proche dans portée
    var best=null, bd=b.def.range*b.def.range;
    for(var k=0;k<G.enemies.length;k++){
      var e=G.enemies[k];
      var d=dist2(b.x+0.5,b.y+0.5,e.x,e.y);
      if(d<bd){ bd=d; best=e; }
    }
    if(best){
      fireProjectile(b,best);
      b.cool=b.def.rate*1000 / (1+(b.level-1)*0.15);
    }
  }
}
function fireProjectile(b,e){
  var proj=b.def.proj||'arrow';
  var dmg=b.def.dmg*(1+(b.level-1)*0.3);
  // boost académie
  var acadBoost=countBuilt('academie')>0?1.2:1;
  if(proj==='magic') dmg*=acadBoost;
  // boost tour de guet (watchTower)
  var rangeBoost=1; for(var wt=0;wt<G.buildings.length;wt++){var wb=G.buildings[wt];if(wb.built&&wb.def.watchTower&&dist2(b.x,b.y,wb.x,wb.y)<9)rangeBoost=1.25;}
  G.projectiles.push({
    type:proj, x:b.x+0.5, y:b.y+0.5, tx:e.x, ty:e.y, target:e,
    spd:proj==='bomb'||proj==='boulder'?0.09:(proj==='magic'||proj==='ice'?0.20:proj==='bolt'?0.22:0.18),
    dmg:dmg, splash:b.def.splash||0, freezeDur:b.def.freeze||0,
    ang:0, arc:0, t:0, from:b
  });
  if(proj==='magic') SFX.magic();
  else if(proj==='bomb'||proj==='boulder') beep(180,'square',.05,.06);
  else if(proj==='ice') SFX.freeze();
  else SFX.shoot();
  // recul flash : petit
}
function updateProjectiles(dt){
  for(var i=G.projectiles.length-1;i>=0;i--){
    var p=G.projectiles[i];
    p.t+=dt;
    // si cible morte, viser dernière position
    var tx=p.target&&G.enemies.indexOf(p.target)>=0 ? p.target.x : p.tx;
    var ty=p.target&&G.enemies.indexOf(p.target)>=0 ? p.target.y : p.ty;
    p.tx=tx; p.ty=ty;
    var dx=tx-p.x, dy=ty-p.y, d=Math.sqrt(dx*dx+dy*dy);
    p.ang=Math.atan2(dy,dx)* (TH/TW); // approx pour iso
    p.ang=Math.atan2((ty-p.y),(tx-p.x));
    if(p.type==='bomb'){ p.arc=Math.sin(clamp(1-d/2,0,1)*Math.PI)*20; }
    if(d<0.15){
      impactProjectile(p);
      G.projectiles.splice(i,1);
    } else {
      p.x+=dx/d*p.spd; p.y+=dy/d*p.spd;
    }
  }
}
function impactProjectile(p){
  var px=sx(p.x,p.y), py=sy(p.x,p.y);
  if(p.splash>0){
    var col=p.type==='boulder'?'#a09060':p.type==='fireball'?'#ff6a20':'#ff8a2a';
    burst(px,py-4,14,{col:col,size:4+p.splash*2,spread:4+p.splash,decay:0.025});
    burst(px,py-4,8,{col:'#ffce3a',size:3,spread:5,decay:0.04});
    SFX.boom(); shakeCam(3+p.splash*2);
    for(var k=G.enemies.length-1;k>=0;k--){
      var e=G.enemies[k];
      if(dist2(p.x,p.y,e.x,e.y) < p.splash*p.splash){
        damageEnemy(e,p.dmg, sx(e.x,e.y), sy(e.x,e.y));
      }
    }
  } else if(p.type==='ice'){
    burst(px,py-4,8,{col:'#a0e8ff',size:3,spread:3,decay:0.04,grav:0});
    if(p.target && G.enemies.indexOf(p.target)>=0){
      p.target.frozen=Math.max(p.target.frozen||0, p.freezeDur||2000);
      damageEnemy(p.target,p.dmg,px,py);
    }
  } else {
    if(p.type==='magic'){ burst(px,py-4,8,{col:'#c080ff',size:3,spread:3,decay:0.04}); }
    else if(p.type==='bolt'){ burst(px,py-4,5,{col:'#e8c880',size:2.5,spread:2,decay:0.05}); }
    else { burst(px,py-4,4,{col:'#fff',size:2,spread:2,decay:0.06,grav:0}); }
    if(p.target && G.enemies.indexOf(p.target)>=0){
      damageEnemy(p.target,p.dmg,px,py);
    }
  }
}

/* ========== TROUPES (soldats) ========== */
function updateTroops(dt){
  var sdt=dt/1000;
  for(var i=0;i<G.troops.length;i++){
    var tr=G.troops[i];
    if(tr.hurt>0) tr.hurt-=dt;
    if(G.phase!=='night' || G.enemies.length===0){
      // retour près caserne / château
      moveToward(tr, tr.home.x+0.5, tr.home.y+0.5, 0.02);
      continue;
    }
    // cible ennemi le plus proche
    var best=null, bd=1e9;
    for(var k=0;k<G.enemies.length;k++){
      var e=G.enemies[k]; var d=dist2(tr.x,tr.y,e.x,e.y);
      if(d<bd){ bd=d; best=e; }
    }
    if(!best) continue;
    var dd=Math.sqrt(bd);
    if(dd>0.5){
      var ang=Math.atan2(best.y-tr.y,best.x-tr.x);
      tr.x+=Math.cos(ang)*0.03; tr.y+=Math.sin(ang)*0.03;
    } else {
      tr.atkCd=(tr.atkCd||0)-dt;
      if(tr.atkCd<=0){
        damageEnemy(best, tr.dmg, sx(best.x,best.y), sy(best.x,best.y));
        tr.atkCd=700; SFX.hit();
      }
    }
  }
}
function spawnTroopsFromBarracks(){
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i];
    if(b.built && b.def.spawnTroop){
      var n=b.level+1;
      for(var j=0;j<n;j++){
        G.troops.push({
          x:b.x+0.5+rnd(-0.3,0.3), y:b.y+0.5+rnd(-0.3,0.3),
          hp:60+b.level*20, maxHp:60+b.level*20, dmg:12+b.level*4,
          home:{x:b.x,y:b.y}, seed:Math.random()*10, hurt:0, atkCd:0
        });
      }
    }
  }
}

/* ========== CYCLE JOUR / NUIT ========== */
function updateCycle(dt){
  // Cycle solaire ambiant continu — 4 minutes = une journée complète
  G.tod=(G.tod + dt/240000) % 1;
  // on garde tod entre 0.12 et 0.98 pour avoir toutes les ambiances
  // (nuit courte, jamais noire > 8s)
}
function startNight(){

  G.tod=0.82;

function startDay(){

/* ========== VAGUES ========== */
function buildWave(){
  var d=G.day;
  var list=[];
  var base=4+d*2;
  // composition selon le jour
  var nGluant=Math.round(base*0.5);
  var nGob=d>=2?Math.round(base*0.3):0;
  var nOrc=d>=3?Math.round(base*0.15+d*0.3):0;
  var nBat=d>=4?Math.round(base*0.2):0;
  var i;
  for(i=0;i<nGluant;i++) list.push('gluant');
  for(i=0;i<nGob;i++) list.push('gobelin');
  for(i=0;i<nOrc;i++) list.push('orc');
  for(i=0;i<nBat;i++) list.push('chauve');
  // boss tous les 5 jours
  if(d%5===0){ list.push('golem'); if(d>=10) list.push('golem'); }
  // mélange
  for(i=list.length-1;i>0;i--){ var j=irnd(0,i); var tmp=list[i]; list[i]=list[j]; list[j]=tmp; }
  // scaling HP léger avec les jours
  G.wave={ active:true, total:list.length, killed:0, spawnLeft:list.length, spawnTimer:0, list:list, hpScale:1+(d-1)*0.08 };
  SFX.wave();
  updateWaveUI();
}
function updateWave(dt){
  var w=G.wave;
  if(!w.active) return;
  // spawn progressif
  if(w.spawnLeft>0){
    w.spawnTimer-=dt;
    if(w.spawnTimer<=0){
      spawnEnemy(w.list[w.list.length-w.spawnLeft]);
      w.spawnLeft--;
      w.spawnTimer=rnd(500,1100) - Math.min(400,G.day*30);
    }
  }
  updateWaveUI();
  // victoire nuit
  if(w.spawnLeft<=0 && G.enemies.length===0){
    w.active=false;
    startDay();
  }
}
function spawnEnemy(type){
  var def=EN[type];
  // position d'apparition sur un bord
  var edge=irnd(0,3);
  var x,y;
  if(edge===0){ x=rnd(0,GW); y=-0.5; }
  else if(edge===1){ x=rnd(0,GW); y=GH+0.5; }
  else if(edge===2){ x=-0.5; y=rnd(0,GH); }
  else { x=GW+0.5; y=rnd(0,GH); }
  var hp=Math.round(def.hp*G.wave.hpScale);
  G.enemies.push({
    type:type, def:def, x:x, y:y, hp:hp, maxHp:hp,
    hurt:0, frozen:0, atkCd:0, target:null, fly:def.fly, seed:Math.random()*10
  });
  // effet apparition
  var px=sx(x,y), py=sy(x,y);
  burst(px,py-4,6,{col:'#5e3a9e',size:2.5,spread:2,decay:0.05,grav:0});
}

/* ========== SORTS ========== */
function castSpell(which){
  if(G.cd[which]>0){ toast('Sort en recharge','bad'); SFX.err(); return; }
  var cost=G.spellCost[which];
  if(G.mana<cost){ toast('Pas assez de mana 🔵','bad'); SFX.err(); return; }
  if(which==='meteor'){
    // mode ciblage
    G.spellMode='meteor';
    toast('☄️ Touchez où frapper !','epic');
    document.getElementById('place-hint').classList.add('on');
    document.querySelector('#place-hint span').innerHTML='☄️ Visez une zone';
    return;
  }
  if(which==='freeze'){
    G.mana-=cost; G.cd.freeze=G.spellCdMax.freeze;
    for(var i=0;i<G.enemies.length;i++){ G.enemies[i].frozen=3000; }
    SFX.freeze();
    for(var j=0;j<G.enemies.length;j++){ var e=G.enemies[j]; var px=sx(e.x,e.y),py=sy(e.x,e.y); burst(px,py-6,6,{col:'#aee0ff',size:3,spread:2,decay:0.04,grav:0}); }
    toast('❄️ Ennemis gelés !','good');
    floatText(VW/2,VH/2-40,'GEL !','#aee0ff',20);
  }
  if(which==='heal'){
    G.mana-=cost; G.cd.heal=G.spellCdMax.heal;
    for(var k=0;k<G.buildings.length;k++){ var b=G.buildings[k]; if(b.built){ b.hp=Math.min(b.maxHp,b.hp+b.maxHp*0.4); var px2=sx(b.x+0.5,b.y+0.5),py2=sy(b.x+0.5,b.y+0.5); burst(px2,py2-8,5,{col:'#7cffce',size:2.5,spread:2,decay:0.05,shape:'star'}); } }
    SFX.heal();
    toast('💚 Bâtiments réparés !','good');
    floatText(VW/2,VH/2-40,'SOIN !','#7cffce',20);
  }
  updateSpellUI();
}
function meteorStrike(gx,gy){
  var cost=G.spellCost.meteor;
  G.mana-=cost; G.cd.meteor=G.spellCdMax.meteor;
  G.spellMode=null;
  document.getElementById('place-hint').classList.remove('on');
  document.querySelector('#place-hint span').innerHTML='Touchez une case <span class="ok">verte</span>';
  var px=sx(gx,gy), py=sy(gx,gy);
  // impact
  SFX.boom(); shakeCam(14);
  burst(px,py-4,30,{col:'#ff6a2a',size:5,spread:6,decay:0.02});
  burst(px,py-4,18,{col:'#ffce3a',size:4,spread:8,decay:0.03});
  burst(px,py-4,10,{col:'#888',size:5,spread:5,decay:0.025});
  floatText(px,py-30,'☄️ MÉTÉORE','#ff6a2a',16);
  var radius=2.0;
  for(var k=G.enemies.length-1;k>=0;k--){
    var e=G.enemies[k];
    if(dist2(gx,gy,e.x,e.y)<radius*radius){
      damageEnemy(e, 90, sx(e.x,e.y), sy(e.x,e.y));
    }
  }
  updateSpellUI();
}
function updateCooldowns(dt){
  for(var s in G.cd){ if(G.cd.hasOwnProperty(s)){ if(G.cd[s]>0){ G.cd[s]-=dt/1000; if(G.cd[s]<0) G.cd[s]=0; } } }
}

function updateConstruction(dt){
  for(var i=0;i<G.buildings.length;i++){
    var b=G.buildings[i];
    if(b.built) continue;
    if(b.def.build<=0){ b.built=true; b.prog=1; recomputeStats(); continue; }
    var remaining=b.buildEnd - now();
    b.prog = 1 - Math.max(0, remaining) / b.buildDur;
    if(b.prog>=1){ finishBuild(b); }
  }
}

/* ========== TOAST ========== */
function toast(msg,kind){
  var box=document.getElementById('toasts');
  var t=document.createElement('div');
  t.className='toast'+(kind?' '+kind:'');
  t.textContent=msg;
  box.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 2900);
  // limite
  while(box.children.length>4){ box.removeChild(box.firstChild); }
}

/* ========== HUD ========== */
function fmtNum(n){ n=Math.floor(n); if(n>=10000) return Math.floor(n/1000)+'k'; return ''+n; }
function fmtTime(secs){
  secs=Math.max(0,Math.floor(secs));
  if(secs===0) return 'Terminé';
  if(secs<60){ return secs+'s'; }
  if(secs<3600){ var m=Math.floor(secs/60),s=secs%60; return m+'min'+(s>0?' '+s+'s':''); }
  if(secs<86400){ var h=Math.floor(secs/3600),mn=Math.floor((secs%3600)/60); return h+'h'+(mn>0?' '+mn+'min':''); }
  var d=Math.floor(secs/86400),hr=Math.floor((secs%86400)/3600); return d+'j'+(hr>0?' '+hr+'h':'');
}
function updateHUD(){
  document.getElementById('v-gold').textContent=fmtNum(G.res.gold);
  document.getElementById('v-wood').textContent=fmtNum(G.res.wood);
  document.getElementById('v-stone').textContent=fmtNum(G.res.stone);

  document.getElementById('c-wood').textContent='/'+fmtNum(G.cap.wood);
  document.getElementById('c-stone').textContent='/'+fmtNum(G.cap.stone);
  document.getElementById('c-food').textContent='/'+fmtNum(G.cap.food);
  try{var vd=document.getElementById('v-day');if(vd)vd.textContent=G.day;}catch(e){}
  // sous-barre : pop / niveau / bonheur
  try{
    var vp=document.getElementById('v-pop'); if(vp) vp.textContent=G.pop+'/'+G.popMax;
    var vl=document.getElementById('v-lvl'); if(vl) vl.textContent=G.level;
    var lf=document.getElementById('lvl-fill'); if(lf) lf.style.width=Math.round(G.levelProg*100)+'%';
    var vh=document.getElementById('v-happy'); if(vh){ vh.textContent=G.happy+'%';
      var hp=document.getElementById('pod-happy');
      var face = G.happy>=120?'😄':(G.happy>=90?'😊':(G.happy>=60?'😐':'😟'));
      var hi=hp.querySelector('.sub-ico'); if(hi) hi.textContent=face;
    }
  }catch(e){}
  // pods pleins
  var pods={gold:'pod-gold',wood:'pod-wood',stone:'pod-stone',food:'pod-food'};
  for(var r in pods){ if(pods.hasOwnProperty(r)){

var curTab='pop';

var CARDMAP={chateau:[1.554,107.3],ouvrier:[2.6,91.2],tente:[2.6,91.2],cabane:[2.535,91.7],maison:[2.293,93.7],auberge:[2.293,93.7],manoir:[1.376,101.0],ferme:[2.6,91.2],grande_ferme:[2.6,101.6],scierie:[2.6,91.2],carriere:[2.6,104.2],mine_or:[2.6,104.2],marche:[2.6,91.2],guilde:[2.007,95.9],port:[2.189,94.5],moulin:[2.189,94.5],entrepot:[2.6,91.2],grand_entrepot:[2.14,94.9],palissade:[2.6,91.2],muraille:[2.6,91.2],rempart:[2.6,91.2],tour_archer:[1.966,96.3],balliste:[2.6,91.2],tour_feu:[2.6,91.2],canon:[2.6,91.2],tour_glace:[2.408,92.7],tour_magie:[1.852,97.2],catapulte:[2.6,91.2],tour_guet:[2.007,95.9],caserne:[2.6,91.2],forge:[2.6,91.2],temple:[1.661,98.7],academie:[1.926,96.6],hopital:[2.408,92.7],jardin:[2.6,106.8],chaumiere:[2.349,93.2],tour_habitation:[1.357,101.1],palais:[1.529,99.8],puits:[2.6,91.2],pecherie:[2.6,91.2],vignoble:[2.6,104.2],banque:[2.6,91.2],atelier:[2.6,91.2],tourelle:[2.6,91.2],mortier:[2.6,91.2],tour_foudre:[2.408,92.7],tour_poison:[2.408,92.7],bastion:[2.6,91.2],porte:[2.6,91.2],bibliotheque:[2.408,92.7],observatoire:[2.535,91.7],fontaine:[2.6,91.2],statue:[2.535,91.7],lampadaire:[2.6,91.2],arbre_deco:[2.6,91.2],sapin:[2.094,95.2],etang:[2.6,91.2],banniere:[2.6,91.2],feu_camp:[2.6,109.4],horloge:[1.633,98.9]};
function drawCard(canvas, buildType, buildDef){
  canvas.width=CARD_W;
  canvas.height=CARD_H;
  var c2=canvas.getContext('2d');
  if(!c2) return;
  c2.clearRect(0,0,CARD_W,CARD_H);
  // cadrage par bâtiment (échelle + position calculées)
  var mp=CARDMAP[buildType];
  var sc = mp ? mp[0] : 1.7;
  var cy = mp ? mp[1] : CARD_H-10;
  try{
    buildDef.draw(c2, CARD_CX, cy, sc, 1, now()/1000);
  }catch(e){
    c2.fillStyle='#ff8a65';
    c2.font='bold 8px sans-serif'; c2.textAlign='center';
    c2.fillText(String(e.message||e).substring(0,20), CARD_CX, CARD_H/2);
  }
}

function openBuildPanel(){
  if(G.over) return;
  renderBuildPanel();
  document.getElementById('build-panel').classList.add('on');
  document.getElementById('scrim').classList.add('on');
  SFX.select();
}
function closeBuildPanel(){
  document.getElementById('build-panel').classList.remove('on');
  document.getElementById('scrim').classList.remove('on');
}
function renderBuildPanel(){
  // tabs
  var tabsEl=document.getElementById('bp-tabs');
  // mise à jour titre avec état ouvriers
  var busy2=countUnderConstruction();
  var drwTitle=document.getElementById('bp-x').parentNode.querySelector('.bp-title');
  if(drwTitle) drwTitle.textContent='🔨 Construire — 👷 '+busy2+'/'+G.workers+' ouvrier'+(G.workers>1?'s':'');
  tabsEl.innerHTML='';
  for(var i=0;i<CATS.length;i++){
    (function(cat){
      var t=document.createElement('div');
      t.className='bp-tab'+(curTab===cat.id?' on':'');
      t.innerHTML=cat.ico+' '+cat.name;
      t.onclick=function(){ curTab=cat.id; renderBuildPanel(); SFX.select(); };
      tabsEl.appendChild(t);
    })(CATS[i]);
  }
  // grid
  var grid=document.getElementById('bp-grid');
  grid.innerHTML='';
  for(var k=0;k<BORDER_ORDER.length;k++){
    var type=BORDER_ORDER[k];
    var def=B[type];
    if(def.cat!==curTab) continue;
    (function(type,def){
      var locked = def.tier>0 && G.day < def.tier;
      var afford = canAfford(def.cost);
      var card=document.createElement('div');
      card.className='bcard'+(locked?' locked':'')+(!afford&&!locked?' cant':'');
      // ── NOM EN HAUT (bandeau, toujours visible) ──
      var nm=document.createElement('div'); nm.className='bcard-nm'; nm.textContent=def.name; card.appendChild(nm);
      // ── coût + temps ──
      var meta=document.createElement('div'); meta.className='bcard-meta';
      var costHtml=''; var emptyCost=true;
      for(var r in def.cost){ if(def.cost.hasOwnProperty(r)){ emptyCost=false;
        var icn={gold:'🪙',wood:'🪵',stone:'🪨',food:'🍖'}[r];
        var ok=(G.res[r]||0)>=def.cost[r];
        costHtml+='<span class="ctag'+(ok?'':' no')+'">'+icn+def.cost[r]+'</span>';
      }}
      if(emptyCost) costHtml='<span class="ctag">Gratuit</span>';
      var costD=document.createElement('div'); costD.className='bcard-cost'; costD.innerHTML=costHtml;
      meta.appendChild(costD);
      if(def.build>0){ var btt=document.createElement('div'); btt.className='bcard-time'; btt.textContent='⏱ '+fmtTime(def.build); meta.appendChild(btt); }
      card.appendChild(meta);
      // ── conteneur image : canvas + cadenas overlay (jamais sur le titre) ──
      var imgWrap=document.createElement('div');
      imgWrap.style.cssText='flex:1;min-height:0;position:relative;width:100%;';
      var cv2=document.createElement('canvas');
      cv2.className='bcard-cv';
      imgWrap.appendChild(cv2);
      if(locked){
        var lk=document.createElement('div'); lk.className='bcard-lock';
        var lkIco=document.createElement('div'); lkIco.className='bcard-lock-ico'; lkIco.textContent='🔒';
        var lkTxt=document.createElement('div'); lkTxt.className='bcard-lock-txt'; lkTxt.textContent='Jour '+def.tier;
        lk.appendChild(lkIco); lk.appendChild(lkTxt);
        imgWrap.appendChild(lk);
      }
      card.appendChild(imgWrap);
      drawCard(cv2, type, def);
      card.onclick=function(){
        if(locked){ toast('Débloqué au Jour '+def.tier,'bad'); SFX.err(); return; }
        startPlacing(type);
      };
      grid.appendChild(card);
    })(type,def);
  }
}

/* ========== INPUT (tactile + souris) ========== */
var pointer={down:false, x:0, y:0, sx:0, sy:0, moved:false, camX0:0, camY0:0, t0:0};
var pinch={active:false, d0:0, z0:1};

function getXY(e){
  if(e.touches && e.touches.length){ return {x:e.touches[0].clientX, y:e.touches[0].clientY}; }
  if(e.changedTouches && e.changedTouches.length){ return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY}; }
  return {x:e.clientX, y:e.clientY};
}
function onDown(e){
  if(G.over) return;
  if(e.touches && e.touches.length===2){
    pinch.active=true;
    pinch.d0=touchDist(e); pinch.z0=cam.zoom;
    return;
  }
  var p=getXY(e);
  pointer.down=true; pointer.moved=false;
  pointer.x=p.x; pointer.y=p.y; pointer.sx=p.x; pointer.sy=p.y;
  pointer.camX0=cam.x; pointer.camY0=cam.y; pointer.t0=now();
}
function onMove(e){
  if(pinch.active && e.touches && e.touches.length===2){
    var d=touchDist(e);
    var nz=clamp(pinch.z0 * d/pinch.d0, 0.55, 1.8);
    // zoom centré écran
    var midx=VW/2, midy=VH/2;
    var gx=(midx-cam.x)/cam.zoom, gy=(midy-cam.y)/cam.zoom;
    cam.zoom=nz;
    cam.x=midx-gx*cam.zoom; cam.y=midy-gy*cam.zoom;
    return;
  }
  if(!pointer.down) {
    // hover (souris)
    if(!('ontouchstart' in window)){
      var pp=getXY(e); hoverCell=cellAt(pp.x,pp.y);
    }
    return;
  }
  var p=getXY(e);
  var dx=p.x-pointer.sx, dy=p.y-pointer.sy;
  if(Math.abs(dx)>14||Math.abs(dy)>14) pointer.moved=true;
  if(G.placing||G.spellMode){
    // en placement : on déplace le curseur de pose, pas la cam (sauf gros drag)
    hoverCell=cellAt(p.x,p.y);
    if(pointer.moved){ cam.x=pointer.camX0+dx; cam.y=pointer.camY0+dy; }
  } else {
    // drag caméra
    cam.x=pointer.camX0+dx; cam.y=pointer.camY0+dy;
  }
  pointer.x=p.x; pointer.y=p.y;
}
function onUp(e){
  if(pinch.active){ pinch.active=false; if(!(e.touches&&e.touches.length)) {} return; }
  if(!pointer.down) return;
  pointer.down=false;
  var p=getXY(e);
  hoverCell=cellAt(p.x,p.y);
  var quick = (now()-pointer.t0)<600;
  if(!pointer.moved && quick){
    handleTap(p.x,p.y);
  }
}
function touchDist(e){
  var a=e.touches[0], b=e.touches[1];
  var dx=a.clientX-b.clientX, dy=a.clientY-b.clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
function handleTap(px,py){
  var cell=cellAt(px,py);
  // sort météore
  if(G.spellMode==='meteor'){
    if(cell){ meteorStrike(cell.x+0.5,cell.y+0.5); }
    else { G.spellMode=null; document.getElementById('place-hint').classList.remove('on'); }
    return;
  }
  // placement
  if(G.placing){
    if(cell && canPlaceAt(cell.x,cell.y)){ placeBuilding(G.placing,cell.x,cell.y); }
    else { SFX.err(); toast('Case occupée ou invalide','bad'); }
    return;
  }
  // sélection bâtiment
  if(cell){
    var b=buildingAt(cell.x,cell.y);
    if(b){ G.sel=b; SFX.select(); updateInfo(); }
    else { G.sel=null; updateInfo(); }
  } else { G.sel=null; updateInfo(); }
}

// événements — sur le div #game (pas seulement cv) pour couvrir toute la surface
var gameDiv=document.getElementById('game');
gameDiv.addEventListener('touchstart',function(e){ e.preventDefault(); onDown(e); },{passive:false});
gameDiv.addEventListener('touchmove',function(e){ e.preventDefault(); onMove(e); },{passive:false});
gameDiv.addEventListener('touchend',function(e){ e.preventDefault(); onUp(e); },{passive:false});
gameDiv.addEventListener('touchcancel',function(e){ pointer.down=false; pinch.active=false; },{passive:false});
cv.addEventListener('mousedown',onDown);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
cv.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=cv.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  var gx=(mx-cam.x)/cam.zoom, gy=(my-cam.y)/cam.zoom;
  cam.zoom=clamp(cam.zoom * (e.deltaY<0?1.12:0.89), 0.55, 1.8);
  cam.x=mx-gx*cam.zoom; cam.y=my-gy*cam.zoom;
},{passive:false});

/* ========== BOUTONS UI ========== */
function wireButtons(){
  document.getElementById('tb-build').onclick=function(){ if(G.placing){cancelPlacing();} openBuildPanel(); };
  document.getElementById('bp-x').onclick=closeBuildPanel;
  document.getElementById('scrim').onclick=closeBuildPanel;
  document.getElementById('info-x').onclick=function(){ G.sel=null; updateInfo(); };
  document.getElementById('ph-cancel').onclick=function(){ cancelPlacing(); document.getElementById('place-hint').classList.remove('on'); };
}

/* ========== BOUCLE DE JEU ========== */
var lastT=0;
function loop(ts){
  try{
    if(!lastT) lastT=ts;
    var dt=ts-lastT; lastT=ts;
    if(dt>100) dt=100;
    if(G.started && !G.over){
      updateCycle(dt);
      economyTick(dt);
      updateVillagers();
      updateParticles();
      updateAmbient(dt);
      updateConstruction(dt);
      updateShake();
      uiAccum+=dt;
      if(uiAccum>200){ uiAccum=0; if(G.sel) updateInfo(); }
    }
    render();
  }catch(err){
    // afficher l'erreur sans arrêter le RAF
    try{
      var ed=document.getElementById('_errbox');
      if(!ed){ ed=document.createElement('div'); ed.id='_errbox';
        ed.style.cssText='position:fixed;top:58px;left:8px;right:8px;background:#500;color:#fff;padding:8px;border-radius:8px;font:10px monospace;z-index:99999;white-space:pre-wrap;';
        document.body.appendChild(ed);
      }
      ed.textContent='LOOP ERR: '+String(err.message||err)+'\n'+(err.stack?String(err.stack).substring(0,200):'');
    }catch(e2){}
  }
  requestAnimationFrame(loop);
}
var uiAccum=0;

/* ========== INIT ========== */
function init(){
  try{
  genWorld();
  // place le château au centre
  var cx=Math.floor(GW/2), cy=Math.floor(GH/2);
  var b={ type:'chateau', def:B.chateau, x:cx, y:cy, level:1, built:true, prog:1,
    buildEnd:now(), buildDur:0, hp:B.chateau.hp, maxHp:B.chateau.hp, hurt:0, cool:0, seed:0 };
  G.grid[key(cx,cy)]=b; G.buildings.push(b);
  centerCam();
  recomputeStats();
  spawnVillagers();
  updateHUD();
  wireButtons();
  }catch(initErr){
    try{
      var ed2=document.createElement('div');
      ed2.style.cssText='position:fixed;top:60px;left:8px;right:8px;background:#600;color:#fff;padding:10px;border-radius:8px;font:10px monospace;z-index:99999;white-space:pre-wrap;';
      ed2.textContent='INIT ERR: '+String(initErr.message||initErr)+'\n'+(initErr.stack?String(initErr.stack).substring(0,300):'');
      document.body.appendChild(ed2);
    }catch(e2){}
  }
}

/* ========== DÉMARRAGE ========== */
function boot(){
  initAudio();
  init();
  // loader
  var spin=document.getElementById('load-spin');
  var btn=document.getElementById('load-btn');
  spin.style.display='none';
  btn.style.display='block';
  btn.onclick=function(){
    if(AC && AC.resume) { try{ AC.resume(); }catch(e){} }
    document.getElementById('loader').classList.add('hide');
    G.started=true;
    toast('⚔️ Bienvenue à VALORIA !','epic');
    setTimeout(function(){ toast('🔨 Construisez fermes et tours avant la nuit !','good'); },1500);
  };
  requestAnimationFrame(loop);
}

// lance quand le DOM est prêt
if(document.readyState==='complete'||document.readyState==='interactive'){ setTimeout(boot,30); }
else { document.addEventListener('DOMContentLoaded',boot); }

})(); // fin IIFE
